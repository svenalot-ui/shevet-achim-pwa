<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Shevet Achim</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shevet Achim">
<meta name="theme-color" content="#FAFAF9">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,600&family=Jost:wght@400;500;600&family=Frank+Ruhl+Libre:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/kosher-zmanim@0.9.0/dist/kosher-zmanim.min.js" defer onload="window.__zReady&&window.__zReady()"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<style>
:root{--paper:#FAFAF9;--card:#fff;--cream:#F1EFEA;--gold:#A16207;--goldL:#BFA46F;--ink:#1C1917;--soft:#57534E;--faint:#A8A29E;--line:#E3DFD8;--navbg:rgba(250,250,249,.62);--navbd:rgba(255,255,255,.7)}
html[data-theme="dark"]{--paper:#13110E;--card:#1E1B16;--cream:#262119;--gold:#CBA250;--goldL:#9C8350;--ink:#F0EBE1;--soft:#A8A096;--faint:#6E6759;--line:#322C23;--navbg:rgba(20,17,13,.6);--navbd:rgba(255,255,255,.08)}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Jost',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
#app{position:relative;height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 10px) 18px 6px;color:var(--soft);flex:none;z-index:5}
.locpill{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 13px;border-radius:30px;max-width:60%}
.locpill svg{width:15px;height:15px;stroke:var(--gold);flex:none}
.locpill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topr{display:flex;align-items:center;gap:14px}
.topr svg{width:22px;height:22px;stroke:var(--soft);cursor:pointer}
.scr{flex:1;overflow-y:auto;padding:6px 20px 124px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--soft);font-size:14px;cursor:pointer;margin:4px 0 6px;border:none;background:none;padding:6px 2px}
.back svg{width:19px;height:19px;stroke:var(--soft)}
.lbl{font-size:10.5px;font-weight:500;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin:22px 2px 12px;display:flex;align-items:center;gap:9px}
.lbl .ln{flex:1;height:1px;background:var(--line)}
.h1{font-family:'Bodoni Moda',serif;font-size:29px;font-weight:600;line-height:1.06}
.date{font-family:'Bodoni Moda',serif;font-size:32px;font-weight:600;line-height:1.05}
.greg{font-size:13px;color:var(--soft);margin-top:4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:14px}
.hero{text-align:center;padding:22px 16px 22px}
.hrow{display:flex;align-items:center;justify-content:center;gap:6px}
.chev{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--soft);cursor:pointer;font-size:18px;flex:none}
.pname{font-family:'Bodoni Moda',serif;font-size:28px;font-weight:600;flex:1;color:var(--ink)}
.count{font-size:14px;color:var(--gold);margin-top:8px;font-weight:500;min-height:18px}
.win{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;display:flex;flex-direction:column;gap:9px}
.wrow{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--soft)}
.wrow b{color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums}
.dot{width:5px;height:5px;border-radius:50%;background:var(--goldL)}
.bigtiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.bt{border:none;border-radius:20px;padding:18px 16px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:10px;min-height:100px;justify-content:space-between}
.bt.dark{background:var(--ink);color:var(--paper)}.bt.dark svg{stroke:var(--gold)}
.bt.light{background:var(--card);color:var(--ink);border:1px solid var(--line)}.bt.light svg{stroke:var(--gold)}
.bt svg{width:28px;height:28px}
.bt .bn{font-size:16px;font-weight:500}
.bt .bh{font-family:'Frank Ruhl Libre';font-size:13px;opacity:.7;margin-top:-4px}
.tehil{display:flex;align-items:center;gap:14px;background:var(--cream);border:1px solid var(--line);border-radius:20px;padding:15px 18px;cursor:pointer;margin-bottom:14px}
.tehil .tn{width:42px;height:42px;border-radius:13px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Bodoni Moda';font-size:20px;flex:none}
.tehil .tt{flex:1}.tehil .tt .a{font-size:14.5px;font-weight:500}.tehil .tt .b{font-size:12.5px;color:var(--soft);margin-top:1px}
.tehil svg{width:18px;height:18px;stroke:var(--faint);transform:scaleX(-1)}
.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tool{background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 0}
.tc{width:56px;height:56px;border-radius:18px;background:var(--cream);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.tc svg{width:25px;height:25px;stroke:var(--gold)}
.tl{font-size:11px;color:var(--soft);text-align:center;line-height:1.25}
.group{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden}
.row{display:flex;align-items:center;padding:15px 18px;border-top:1px solid var(--line);cursor:pointer;gap:13px}
.row:first-child{border-top:none}
.row:active{background:var(--cream)}
.ricon{width:40px;height:40px;border-radius:12px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}
.ricon svg{width:22px;height:22px;stroke:var(--gold)}
.rt{flex:1}.rt .nm{font-size:15px;font-weight:500}.rt .sub{font-size:12px;color:var(--faint);margin-top:1px}
.he{font-family:'Frank Ruhl Libre',serif;font-size:17px;color:var(--ink)}
.time{font-size:14px;color:var(--soft);font-variant-numeric:tabular-nums}
.soon{font-size:11px;color:var(--faint)}
.ch{color:var(--faint);font-size:18px}
/* tzedaka compact */
.tzc{display:flex;align-items:center;gap:13px;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:14px 16px;margin-bottom:14px;cursor:pointer}
.tzc .ic{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none}
.tzc .ic svg{width:21px;height:21px;stroke:var(--gold)}
.tzc .tt{flex:1}.tzc .tt .a{font-size:14.5px;font-weight:500}.tzc .tt .b{font-size:12px;color:var(--soft);margin-top:2px;line-height:1.4}
.tzc svg.cv{width:18px;height:18px;stroke:var(--faint);transform:scaleX(-1)}
.qrbox{background:#fff;border-radius:16px;padding:16px;width:max-content;margin:14px auto 0;display:flex;align-items:center;justify-content:center}
.req{font-size:13px}.reqrow{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line);align-items:center}
.reqrow:first-child{border-top:none}.reqrow .k{color:var(--soft);flex:none}.reqrow .v{font-weight:500;text-align:right;font-variant-numeric:tabular-nums;word-break:break-all}
.copy{background:none;border:none;cursor:pointer;color:var(--gold);display:flex;flex:none;margin-inline-start:6px}.copy svg{width:16px;height:16px;stroke:var(--gold)}
.note{font-size:12.5px;color:var(--soft);line-height:1.6;padding:2px 2px}
.btn{display:block;width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:16px;padding:13px;font-family:'Jost';font-size:14.5px;font-weight:500;cursor:pointer;margin-top:14px}
/* reader (texts) */
.langseg{display:flex;gap:6px;justify-content:center;margin:6px 0 18px}
.langseg button{border:1px solid var(--line);background:var(--card);border-radius:30px;padding:7px 16px;font-family:'Jost';font-size:13px;cursor:pointer;color:var(--soft)}
.langseg button.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.verse{margin-bottom:16px}
.vhe{font-family:'Frank Ruhl Libre',serif;font-size:22px;line-height:1.95;color:var(--ink);direction:rtl;text-align:right}
.vtr{font-size:16px;line-height:1.7;color:var(--ink);margin-top:4px}
.vnum{display:inline-block;min-width:22px;color:var(--gold);font-family:'Bodoni Moda';font-size:14px;margin-inline-end:6px}
.loading{text-align:center;color:var(--faint);padding:30px;font-size:14px}
/* compass */
.cwrap{display:flex;flex-direction:column;align-items:center;padding-top:6px}
.cmpbox{position:relative;width:270px;max-width:80vw;aspect-ratio:1;margin:8px auto 0}
.cmp-idx{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:3}.cmp-idx svg{width:22px;height:22px;fill:var(--gold)}
.mdist{font-family:'Bodoni Moda',serif;font-size:30px;text-align:center;margin-top:16px;color:var(--ink)}
.mbear{font-size:13px;color:var(--gold);text-align:center;margin-top:3px;letter-spacing:1px}
.aligned{text-align:center;margin-top:14px;font-size:14px;color:var(--gold);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;min-height:20px}
.aligned svg{width:18px;height:18px;stroke:var(--gold)}
.cbtn{display:block;margin:16px auto 0;background:var(--ink);color:var(--paper);border:none;border-radius:30px;padding:12px 24px;font-family:'Jost';font-size:14px;cursor:pointer}
.set-seg{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.set-seg button{border:1px solid var(--line);background:var(--card);border-radius:30px;padding:9px 15px;font-family:'Jost';font-size:13px;cursor:pointer;color:var(--soft)}
.set-seg button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.seg-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:10px}
.seg-card .sn{font-size:15px;font-weight:500;display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.seg-card .sc{font-size:13px;color:var(--gold);font-variant-numeric:tabular-nums;flex:none}
.seg-card .sd{font-size:13px;color:var(--soft);margin-top:5px;line-height:1.5}
/* liquid glass nav */
.navwrap{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:center;pointer-events:none;padding:0 12px calc(env(safe-area-inset-bottom) + 10px);z-index:10}
.navbar{pointer-events:auto;display:flex;align-items:flex-end;width:100%;max-width:480px;background:var(--navbg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--navbd);border-radius:28px;padding:7px 6px;box-shadow:0 10px 34px rgba(0,0,0,.16),inset 0 1px 0 rgba(255,255,255,.4)}
.navbar button{flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);padding:5px 0}
.navbar button svg{width:23px;height:23px;stroke:currentColor}
.navbar button .n{font-size:9.5px;font-weight:500}
.navbar button.on{color:var(--gold)}
.navc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.navc .circ{width:52px;height:52px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;margin-top:-24px;border:3px solid var(--paper);box-shadow:0 6px 16px rgba(161,98,7,.45)}
.navc .circ svg{width:24px;height:24px;stroke:#fff}
.navc .n{font-size:9.5px;font-weight:600;color:var(--gold)}
.rtl{direction:rtl}.rtl .rt,.rtl .bt,.rtl .note,.rtl .tzc .tt{text-align:right}
.hidden{display:none!important}
#ob{position:absolute;inset:0;background:var(--paper);z-index:50;display:flex;flex-direction:column;justify-content:center;padding:36px 30px calc(env(safe-area-inset-bottom) + 36px)}
#ob .obhe{font-family:'Frank Ruhl Libre';color:var(--gold);font-size:28px;direction:rtl}
#ob h1{font-family:'Bodoni Moda',serif;font-size:25px;font-weight:600;margin-top:6px}
#ob p{font-size:13px;color:var(--soft);margin-top:6px;line-height:1.5}
#ob .opts{margin-top:28px;display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:20px;overflow:hidden}
#ob .opts button{background:var(--card);border:none;padding:16px 20px;font-family:'Jost';font-size:15px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--ink)}
#ob .opts button:active{background:var(--cream)}
#ob .opts button span{font-family:'Frank Ruhl Libre';color:var(--faint);font-size:15px}
#ob small{display:block;margin-top:18px;color:var(--faint);font-size:12px;line-height:1.5}
#toast{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:30px;font-size:13px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="top">

    <div class="topr">

      <svg onclick="cycleLang()" viewBox="0 0 24 24" fill="none" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/></svg>
    </div>
  </div>
  <div class="scr" id="scr"></div>
  <div class="navwrap"><div class="navbar" id="nav"></div></div>
  <div id="ob" class="hidden"></div>
  <div id="toast"></div>
</div>

window.cycleTheme=function(){const o=['auto','light','dark'];theme=o[(o.indexOf(theme)+1)%3];localStorage.setItem('theme',theme);applyTheme();toast(L[lang].setTheme+': '+(theme==='auto'?L[lang].themeAuto:theme==='light'?L[lang].themeLight:L[lang].themeDark));};

/* zmanim via KosherJava */
function parseT(s){return (s&&s!=='N/A')?new Date(s):null;}
function getZmanim(){
 if(!loc)return null;
 try{if(window.KosherZmanim&&window.KosherZmanim.getZmanimJson){
   const j=window.KosherZmanim.getZmanimJson({date:new Date(),locationName:'',latitude:loc.lat,longitude:loc.lng,elevation:0,timeZoneId:TZID,complexZmanim:true});
   const z=j.Zmanim,sr=parseT(z.Sunrise),ss=parseT(z.Sunset);
   return {alot:parseT(z.Alos72),misheyakir:parseT(z.Misheyakir11Point5Degrees)||(sr?new Date(+sr-50*6e4):null),netz:sr,sofShma:parseT(z.SofZmanShmaGRA),sofTfila:parseT(z.SofZmanTfilaGRA),chatzot:parseT(z.Chatzos),minchaG:parseT(z.MinchaGedola),minchaK:parseT(z.MinchaKetana),plag:parseT(z.PlagHamincha),shkia:ss,tzeit:parseT(z.Tzais)||parseT(z.Tzais72)};
 }}catch(e){}
 return null;
}
function fmt(d){if(!d)return '—';return d.toLocaleTimeString(L[lang].locale,{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:TZID})}
function gapTxt(ms){const m=Math.round(ms/6e4),h=Math.floor(m/60),mm=m%60,H=lang==='he'?'שע׳':lang==='en'?'h':'ч',M=lang==='he'?'דק׳':lang==='en'?'min':'мин';return h>0?`${h} ${H} ${mm} ${M}`:`${mm} ${M}`}
function bearing(a,b){const r=Math.PI/180,dL=(b.lng-a.lng)*r,y=Math.sin(dL)*Math.cos(b.lat*r),x=Math.cos(a.lat*r)*Math.sin(b.lat*r)-Math.sin(a.lat*r)*Math.cos(b.lat*r)*Math.cos(dL);return (Math.atan2(y,x)*180/Math.PI+360)%360}
function distKm(a,b){const r=Math.PI/180,R=6371,dLa=(b.lat-a.lat)*r,dLo=(b.lng-a.lng)*r,h=Math.sin(dLa/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}
function hebDay(){try{const p=new Intl.DateTimeFormat('en-u-ca-hebrew',{day:'numeric'}).formatToParts(new Date());let day=1;p.forEach(x=>{if(x.type==='day')day=parseInt(x.value)});return day}catch(e){return new Date().getDate()}}
function hebDate(){try{return new Intl.DateTimeFormat(L[lang].locale+'-u-ca-hebrew',{day:'numeric',month:'long',year:'numeric'}).format(new Date()).replace(/\s*(AM|anno mundi|לבריאת העולם|לבריאה)\s*$/i,'').trim()}catch(e){return ''}}
function gregDate(){return new Intl.DateTimeFormat(L[lang].locale,{weekday:'short',day:'numeric',month:'long'}).format(new Date())}

function prayerState(z){
 const now=new Date(),d=L[lang];
 const items=[{n:d.sh,start:z.netz,end:z.chatzot,w:[[d.shma,z.sofShma],[d.amida,z.sofTfila]]},{n:d.mi,start:z.minchaG,end:z.shkia,w:[[d.mgedola,z.minchaG],[d.shkia,z.shkia]]},{n:d.ma,start:z.tzeit,end:null,w:[[d.tzeit,z.tzeit]]}];
 let c=0;if(z.chatzot&&now<z.chatzot)c=0;else if(z.shkia&&now<z.shkia)c=1;else c=2;
 if(pidx===null)pidx=c;const p=items[pidx];let count;
 if(p.start&&p.end&&now>=p.start&&now<p.end)count=`${d.now} · ${d.until} ${fmt(p.end)}`;
 else if(p.start&&now<p.start)count=`${d.into} ${gapTxt(p.start-now)} · ${fmt(p.start)}`;
 else count=p.start?fmt(p.start):'—';
 return {p,count};
}

function compassSVG(){
 let ticks='';for(let i=0;i<72;i++){const a=i*5*Math.PI/180,maj=i%9===0,r2=maj?92:99,x1=130+114*Math.sin(a),y1=130-114*Math.cos(a),x2=130+r2*Math.sin(a),y2=130-r2*Math.cos(a);ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${maj?'var(--goldL)':'var(--line)'}" stroke-width="${maj?2:1}"/>`}
 const lbls=lang==='he'?['צ','מז','ד','מע']:['N','E','S','W'];
 const card=[[lbls[0],0],[lbls[1],90],[lbls[2],180],[lbls[3],270]].map(([k,dg])=>{const a=dg*Math.PI/180,x=130+78*Math.sin(a),y=130-78*Math.cos(a);return `<text x="${x.toFixed(1)}" y="${(y+5).toFixed(1)}" text-anchor="middle" font-family="Jost" font-size="14" fill="${dg===0?'var(--gold)':'var(--faint)'}">${k}</text>`}).join('');
 const rose=heading!==null?-heading:0;const b=loc?bearing(loc,KOTEL):0;const arrow=heading!==null?(b-heading):b;
 return `<svg viewBox="0 0 260 260" width="100%" style="display:block">
   <circle cx="130" cy="130" r="126" fill="var(--card)" stroke="var(--line)"/><circle cx="130" cy="130" r="118" fill="none" stroke="var(--cream)"/>
   <g id="rose" transform="rotate(${rose.toFixed(1)} 130 130)" style="transition:transform .15s linear">${ticks}${card}</g>
   <g id="arrow" transform="rotate(${arrow.toFixed(1)} 130 130)" style="transition:transform .15s linear">
     <path d="M130 30 L142 130 L130 142 L118 130 Z" fill="var(--gold)"/><path d="M130 226 L118 130 L130 142 L142 130 Z" fill="var(--line)"/>
     <circle cx="130" cy="44" r="13" fill="var(--cream)" stroke="var(--gold)"/><text x="130" y="49" text-anchor="middle" font-family="Frank Ruhl Libre" font-size="15" fill="var(--gold)">✡</text>
   </g>
   <circle cx="130" cy="130" r="7" fill="var(--ink)"/><circle cx="130" cy="130" r="3" fill="var(--goldL)"/>
 </svg>`;
}
function alignedNow(){if(heading===null||!loc)return false;const b=bearing(loc,KOTEL);return Math.abs(((b-heading+540)%360)-180)<5;}

/* readers (async text) */
const tehCache={};
async function fetchPsalm(n){if(tehCache[n])return tehCache[n];const r=await fetch('https://www.sefaria.org/api/texts/Psalms.'+n+'?context=0');const j=await r.json();const clean=a=>(Array.isArray(a)?a:[]).map(s=>String(s).replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,' '));tehCache[n]={he:clean(j.he),en:clean(j.text)};return tehCache[n];}
function chaptersForDay(day){const rng=TEHILLIM[day];if(!rng)return[];if(rng.indexOf('–')<0)return[parseInt(rng)];const[a,b]=rng.split('–').map(s=>parseInt(s));const out=[];for(let i=a;i<=b;i++)out.push(i);return out;}
let tehDayCur=1, tehTextLang='he';
window.openTehillim=function(){readTehillim(hebDay()>30?30:hebDay());};
window.readTehillim=async function(day){
 const d=L[lang];if(cur!=='tehread'){hist.push(cur);}cur='tehread';tehDayCur=day;
 const chs=chaptersForDay(day);
 scr.className='scr'+(tehTextLang==='he'?' rtl':'');scr.dir=tehTextLang==='he'?'rtl':'ltr';
 scr.innerHTML=`${backBtn()}<div class="h1" style="margin:2px 0 4px">${d.t_teh} · ${d.tehDay} ${day}</div>
   <div class="langseg">${[['he','עברית'],['en','English']].map(([k,t])=>`<button class="${tehTextLang===k?'on':''}" onclick="setTehLang('${k}')">${t}</button>`).join('')}</div>
   <div id="tehbody"><div class="loading">…</div></div>`;
 scr.scrollTop=0;renderNav();
 let html='';
 for(const n of chs){try{const p=await fetchPsalm(n);html+=`<div class="lbl">${d.psalm} ${n}<span class="ln"></span></div>`;const arr=tehTextLang==='he'?p.he:p.en;for(let i=0;i<arr.length;i++){if(tehTextLang==='he'){html+=`<div class="verse"><div class="vhe"><span class="vnum">${i+1}</span>${p.he[i]||''}</div></div>`;}else{html+=`<div class="verse"><div class="vtr"><span class="vnum">${i+1}</span>${p.en[i]||''}</div></div>`;}}}catch(e){html+=`<div class="note">${d.psalm} ${n}: ${lang==='ru'?'не удалось загрузить (нужна сеть при первом открытии)':lang==='en'?'failed to load (needs network first time)':'טעינה נכשלה'}</div>`;}}
 if(document.getElementById('tehbody'))document.getElementById('tehbody').innerHTML=html;
};
function prevForRead(){return ROOTS.includes(cur)?cur:'today';}
window.setTehLang=function(l){tehTextLang=l;readTehillim(tehDayCur);};

const BRACHA={hamotzi:{he:'בָּרוּךְ אַתָּה ה׳ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, הַמּוֹצִיא לֶחֶם מִן הָאָרֶץ.',tr_ru:'Барух ата Адо-най Эло-эйну мэлэх а-олам, а-моци лэхэм мин а-арэц.',tr_en:'Baruch ata A-donai Elo-heinu melech ha’olam, hamotzi lechem min ha’aretz.',ru:'Благословен Ты, Г-сподь, Б-г наш, Царь вселенной, извлекающий хлеб из земли.',en:'Blessed are You, L-rd our G-d, King of the universe, who brings forth bread from the earth.'},
 hagefen:{he:'בָּרוּךְ אַתָּה ה׳ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, בּוֹרֵא פְּרִי הַגָּפֶן.',tr_ru:'Барух ата Адо-най Эло-эйну мэлэх а-олам, борэ при а-гафен.',tr_en:'…borei pri hagafen.',ru:'…сотворивший плод виноградной лозы.',en:'…who creates the fruit of the vine.'},
 haetz:{he:'בָּרוּךְ אַתָּה ה׳ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, בּוֹרֵא פְּרִי הָעֵץ.',tr_ru:'…борэ при а-эц.',tr_en:'…borei pri ha’etz.',ru:'…сотворивший плод дерева.',en:'…who creates the fruit of the tree.'},
 haadama:{he:'בָּרוּךְ אַתָּה ה׳ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, בּוֹרֵא פְּרִי הָאֲדָמָה.',tr_ru:'…борэ при а-адама.',tr_en:'…borei pri ha’adama.',ru:'…сотворивший плод земли.',en:'…who creates the fruit of the ground.'},
 shehakol:{he:'בָּרוּךְ אַתָּה ה׳ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, שֶׁהַכֹּל נִהְיֶה בִּדְבָרוֹ.',tr_ru:'…шеаколь ниье бидваро.',tr_en:'…shehakol nihye bidvaro.',ru:'…по слову Которого возникло всё.',en:'…by whose word all things came to be.'},
 boreh:{he:'בָּרוּךְ אַתָּה ה׳ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, בּוֹרֵא נְפָשׁוֹת רַבּוֹת וְחֶסְרוֹנָן…',tr_ru:'…борэ нефашот работ ве-хэсронан…',tr_en:'…borei nefashot rabot ve’chesronan…',ru:'…сотворивший множество душ и то, в чём они нуждаются…',en:'…who creates many living beings and their needs…'},
 asher:{he:'בָּרוּךְ אַתָּה ה׳ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, אֲשֶׁר יָצַר אֶת הָאָדָם בְּחָכְמָה…',tr_ru:'…ашер яцар эт а-адам бе-хохма…',tr_en:'…asher yatzar et ha’adam bechochma…',ru:'…Который сотворил человека мудро…',en:'…who formed man with wisdom…'}};
window.openBracha=function(id){const b=BRACHA[id];if(!b){toast('скоро');return;}cur='bread_'+id;hist.push(prevForRead());const d=L[lang];
 scr.dir=lang==='he'?'rtl':'ltr';
 const render2=()=>{const tl=textLang;const main=tl==='he'?b.he:(tl==='en'?b.tr_en:b.tr_ru);const tr=tl==='he'?'':(tl==='en'?b.en:b.ru);
  scr.innerHTML=`${backBtn()}<div class="langseg">${[['he','עברית'],['ru','РУС'],['en','EN']].map(([k,t])=>`<button class="${tl===k?'on':''}" onclick="setBLang('${id}','${k}')">${t}</button>`).join('')}</div>
   <div class="card"><div class="${tl==='he'?'vhe':'vtr'}" style="${tl==='he'?'':'font-size:19px'}">${main}</div>${tr?`<div class="note" style="margin-top:14px">${tr}</div>`:''}</div>`;};
 render2();renderNav();scr.scrollTop=0;
};
window.setBLang=function(id,l){textLang=l;openBracha2(id);};
function openBracha2(id){hist.pop();openBracha(id);} // re-render keeping stack

/* nav + routing */
const ROOTS=['today','prayers','brachot','zmanim','more'];
function renderNav(){const d=L[lang];const activeRoot=ROOTS.includes(cur)?cur:(hist.length?hist.find(h=>ROOTS.includes(h))||'today':'today');
 const tabs=[['today','sun'],['prayers','book'],['brachot','C'],['zmanim','clock'],['more','dots']];
 nav.innerHTML=tabs.map(([k,ic])=>{if(ic==='C')return `<div class="navc" onclick="go('brachot',true)"><span class="circ">${svg('grape')}</span><span class="n">${d.brachot}</span></div>`;return `<button class="${activeRoot===k?'on':''}" onclick="go('${k}',true)">${svg(ic)}<span class="n">${d[k]}</span></button>`}).join('');
}
function render(){const d=L[lang];document.documentElement.lang=lang;scr.className='scr'+(lang==='he'?' rtl':'');scr.dir=lang==='he'?'rtl':'ltr';
 const fn=screens()[cur];scr.innerHTML=fn||screens().today;renderNav();
 document.getElementById('loctext').textContent=loc?(loc.name||`${loc.lat.toFixed(2)}, ${loc.lng.toFixed(2)}`):d.locating;
 applyTheme();
 if(cur==='tzedaka')drawQR();
}
function drawQR(){const el=document.getElementById('qr');if(!el)return;el.innerHTML='';if(window.QRCode){try{new QRCode(el,{text:gostQR(),width:160,height:160,colorDark:'#1C1917',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.L});}catch(e){el.innerHTML='<div class="note" style="max-width:150px">QR недоступен — используйте реквизиты ниже</div>';}}else{setTimeout(drawQR,300);}}
window.go=function(s,isTab){textLang=lang;if(isTab){hist=[];cur=s;}else{if(s!==cur){hist.push(cur);cur=s;}}render();scr.scrollTop=0};
window.back=function(){if(hist.length){cur=hist.pop();}else{cur='today';}render();scr.scrollTop=0};
window.nextP=function(){pidx=((pidx||0)+1)%3;render()};
window.prev=function(){pidx=((pidx||0)+2)%3;render()};
window.cycleLang=function(){const o=['ru','en','he'];setLang(o[(o.indexOf(lang)+1)%3])};
window.setLang=function(l){lang=l;textLang=l;localStorage.setItem('lang',l);render()};
window.autoLang=function(){localStorage.removeItem('lang');lang=detectLang();textLang=lang;render()};
window.setNusach=function(n){nusach=n;localStorage.setItem('nusach',n);render()};
window.setTheme=function(t){theme=t;localStorage.setItem('theme',t);applyTheme();render()};
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}
window.copyTxt=function(t){navigator.clipboard&&navigator.clipboard.writeText(t);toast(L[lang].copied);};

/* sensors */
window.requestLocation=function(){if(!navigator.geolocation){loc={lat:31.7683,lng:30.2137,name:'Jerusalem'};render();return;}
 navigator.geolocation.getCurrentPosition(p=>{loc={lat:p.coords.latitude,lng:p.coords.longitude};pidx=null;reverseGeo();render();},()=>{if(!loc){loc={lat:31.7683,lng:35.2137,name:'Jerusalem'};render();}},{enableHighAccuracy:false,timeout:9000,maximumAge:600000});};
function reverseGeo(){try{fetch(`https://nominatim.openstreetmap.org/reverse?format=json&zoom=10&lat=${loc.lat}&lon=${loc.lng}`,{headers:{'Accept':'application/json'}}).then(r=>r.json()).then(j=>{const a=j.address||{};loc.name=a.city||a.town||a.state||a.county||'';render();}).catch(()=>{});}catch(e){}}
window.enableCompass=function(){const start=()=>{compassOn=true;window.addEventListener('deviceorientation',e=>{let h=e.webkitCompassHeading!=null?e.webkitCompassHeading:(e.absolute&&e.alpha!=null?360-e.alpha:null);if(h==null)return;heading=h;if(cur==='mizrah'&&loc){const b=bearing(loc,KOTEL);const rg=document.getElementById('rose'),ar=document.getElementById('arrow');if(rg)rg.setAttribute('transform',`rotate(${(-heading).toFixed(1)} 130 130)`);if(ar)ar.setAttribute('transform',`rotate(${(b-heading).toFixed(1)} 130 130)`);const alm=document.getElementById('alm');if(alm)alm.innerHTML=alignedNow()?(svg('check')+L[lang].facing):'';}},true);render()};
 if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')start()}).catch(()=>{});}else start();};

/* onboarding */
function showOnboarding(){const d=L[lang];ob.innerHTML=`<div class="obhe">שבת אחים גם יחד</div><h1>${d.onbTitle}</h1><p>${d.onbSub}</p><div class="opts">${Object.keys(NUSACH).map(k=>`<button onclick="pickNusach('${k}')">${NUSACH[k][lang]} <span>${NUSACH[k].he}</span></button>`).join('')}</div><small>${d.onbHint}</small>`;ob.classList.remove('hidden');}
window.pickNusach=function(k){nusach=k;localStorage.setItem('nusach',k);ob.classList.add('hidden');render()};

/* init */
window.__zReady=function(){if(nusach){applyTheme();render();}};
applyTheme();requestLocation();
if(!nusach)showOnboarding();
render();
setInterval(()=>{if(cur==='today'||cur==='zmanim'){applyTheme();render();}},60000);
if(location.search.indexOf('nosw')<0&&'serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
