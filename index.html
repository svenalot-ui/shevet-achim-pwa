<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Сидур</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Сидур">
<meta name="theme-color" content="#FAFAF9">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,600&family=Jost:wght@400;500;600&family=Frank+Ruhl+Libre:wght@500;600&family=David+Libre:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/kosher-zmanim@0.9.0/dist/kosher-zmanim.min.js" defer onload="window.__zReady&&window.__zReady()"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<style>
:root{--paper:#FAFAF9;--card:#fff;--cream:#F1EFEA;--gold:#A16207;--goldL:#BFA46F;--ink:#1C1917;--soft:#57534E;--faint:#A8A29E;--line:#E3DFD8;--navbg:rgba(250,250,249,.3);--navbd:rgba(255,255,255,.55)}
html[data-theme="dark"]{--paper:#13110E;--card:#1E1B16;--cream:#262119;--gold:#CBA250;--goldL:#9C8350;--ink:#F0EBE1;--soft:#A8A096;--faint:#6E6759;--line:#322C23;--navbg:rgba(28,24,18,.26);--navbd:rgba(255,255,255,.12)}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Jost',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
#app{position:relative;height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 10px) 16px 6px;flex:none;z-index:5;gap:8px}
.locpill{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:7px 13px;border-radius:30px;min-width:0}
.locpill svg{width:15px;height:15px;stroke:var(--gold);flex:none}
.locpill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topr{display:flex;align-items:center;gap:8px;flex:none}
/* compact top chips */
.ctop-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;transition:border-color .2s,box-shadow .2s,transform .15s}
.ctop-btn:active{transform:scale(.9)}
.ctop-btn svg{width:17px;height:17px;stroke:var(--soft)}
.ctop-lang{height:34px;padding:0 13px;border-radius:17px;border:1px solid var(--line);background:var(--card);cursor:pointer;font-family:'Jost';font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:.8px;flex:none;transition:border-color .2s,transform .15s}
.ctop-lang:active{transform:scale(.95)}
.scr{flex:1;overflow-y:auto;padding:6px 20px 124px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--soft);font-size:14px;cursor:pointer;margin:4px 0 6px;border:none;background:none;padding:6px 2px}
.back svg{width:19px;height:19px;stroke:var(--soft)}
.lbl{font-size:10.5px;font-weight:500;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin:22px 2px 12px;display:flex;align-items:center;gap:9px}
.lbl .ln{flex:1;height:1px;background:var(--line)}
.h1{font-family:'Bodoni Moda',serif;font-size:29px;font-weight:600;line-height:1.06;color:var(--ink)}
.date{font-family:'Bodoni Moda',serif;font-size:32px;font-weight:600;line-height:1.05;color:var(--ink)}
.greg{font-size:13px;color:var(--soft);margin-top:4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:14px}
.hero{text-align:center;padding:22px 16px 22px}
.hrow{display:flex;align-items:center;justify-content:center;gap:6px}
.chev{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--soft);cursor:pointer;font-size:18px;flex:none}
.pname{font-family:'Bodoni Moda',serif;font-size:28px;font-weight:600;flex:1;color:var(--ink)}
.count{font-size:14px;color:var(--gold);margin-top:8px;font-weight:500;min-height:18px}
.win{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;display:flex;flex-direction:column;gap:9px}
.wrow{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--soft)}
.wrow b{color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums}
.dot{width:5px;height:5px;border-radius:50%;background:var(--goldL)}
.bigtiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.bt{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 15px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:transform .12s,box-shadow .2s}
.bt:active{transform:scale(.98)}
.bt .bi{width:40px;height:40px;border-radius:12px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}
.bt-prayers .bi{background:rgba(28,25,23,.06)}.bt-prayers .bi svg{stroke:var(--ink)}
.bt-brachot .bi{background:rgba(161,98,7,.1)}.bt-brachot .bi svg{stroke:var(--gold)}
.bt .bi svg{width:22px;height:22px}
.bt .btx{flex:1;min-width:0}
.bt .bn{font-size:15.5px;font-weight:500;color:var(--ink);line-height:1.1}
.bt .bh{font-family:'Frank Ruhl Libre',serif;font-size:13px;color:var(--soft);margin-top:2px}
.bt .bcv{width:16px;height:16px;stroke:var(--faint);flex:none;transform:scaleX(-1)}
html[data-theme="dark"] .bt{box-shadow:0 2px 12px rgba(0,0,0,.18)}
.tehil{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px 18px;cursor:pointer;margin-bottom:14px}
.tehil .tn{width:58px;height:58px;border-radius:16px;background:linear-gradient(145deg,var(--gold),var(--goldL));display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Bodoni Moda',serif;font-size:34px;font-weight:700;flex:none;line-height:1;box-shadow:0 4px 14px rgba(161,98,7,.28)}
html[data-theme="dark"] .tehil .tn{box-shadow:0 4px 14px rgba(203,162,80,.22)}
.tehil .tt{flex:1}.tehil .tt .a{font-size:14.5px;font-weight:500}.tehil .tt .b{font-size:12.5px;color:var(--soft);margin-top:1px}
.tehil svg{width:18px;height:18px;stroke:var(--faint);transform:scaleX(-1)}
.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tool{background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 0}
.tc{width:56px;height:56px;border-radius:18px;background:var(--cream);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.tc svg{width:25px;height:25px;stroke:var(--gold)}
.tl{font-size:11px;color:var(--soft);text-align:center;line-height:1.25}
.group{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden}
.row{display:flex;align-items:center;padding:15px 18px;border-top:1px solid var(--line);cursor:pointer;gap:13px}
.row:first-child{border-top:none}.row:active{background:var(--cream)}
.ricon{width:40px;height:40px;border-radius:12px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}
.ricon svg{width:22px;height:22px;stroke:var(--gold)}
.rt{flex:1}.rt .nm{font-size:15px;font-weight:500}.rt .sub{font-size:12px;color:var(--faint);margin-top:1px}
.he{font-family:'Frank Ruhl Libre',serif;font-size:17px;color:var(--ink)}
.time{font-size:14px;color:var(--soft);font-variant-numeric:tabular-nums}
.soon{font-size:11px;color:var(--faint)}
.ch{color:var(--faint);font-size:18px}
.tzc{display:flex;align-items:center;gap:13px;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:14px 16px;margin-bottom:14px;cursor:pointer}
.tzc .ic{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none}
.tzc .ic svg{width:21px;height:21px;stroke:var(--gold)}
.tzc .tt{flex:1}.tzc .tt .a{font-size:14.5px;font-weight:500}.tzc .tt .b{font-size:12px;color:var(--soft);margin-top:2px;line-height:1.4}
.tzc svg.cv{width:18px;height:18px;stroke:var(--faint);transform:scaleX(-1)}
.qrbox{background:#fff;border-radius:16px;padding:16px;width:max-content;margin:14px auto 0;display:flex}
.req{font-size:13px}.reqrow{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line);align-items:center}
.reqrow:first-child{border-top:none}.reqrow .k{color:var(--soft);flex:none}.reqrow .v{font-weight:500;text-align:right;word-break:break-all}
.copy{background:none;border:none;cursor:pointer;display:flex;flex:none;margin-inline-start:6px}.copy svg{width:16px;height:16px;stroke:var(--gold)}
.note{font-size:12.5px;color:var(--soft);line-height:1.6;padding:2px 2px}
/* reader */
.rbar{display:flex;gap:6px;align-items:center;margin:6px 0 14px;flex-wrap:wrap}
.rbar button{border:1px solid var(--line);background:var(--card);border-radius:30px;padding:7px 13px;font-family:'Jost';font-size:13px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:5px}
.rbar button svg{width:15px;height:15px;stroke:var(--gold)}
.rbar .sp{flex:1}
.langseg{display:flex;gap:6px;margin:0 0 14px}
.langseg button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:9px;font-family:'Jost';font-size:13px;cursor:pointer;color:var(--soft)}
.langseg button.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.reader{border:1px solid var(--line);border-radius:18px;padding:20px 22px;line-height:1.95}
.reader.rtl{direction:rtl;text-align:right}
.reader .pn{font-family:'Bodoni Moda',serif;font-weight:600;color:var(--gold);text-align:center;margin:6px 0 14px;letter-spacing:.5px}
.reader .vn{color:var(--gold);font-size:.62em;vertical-align:.15em;margin-inline-end:5px;font-family:'Bodoni Moda'}
.reader .v{margin-bottom:.5em}
.loading{text-align:center;color:var(--faint);padding:30px;font-size:14px}
/* tehillim grid */
.tgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.tg{aspect-ratio:1;border:1px solid var(--line);background:var(--card);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda';font-size:18px;font-weight:600;color:var(--ink);cursor:pointer}
.tg.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.modeseg{display:flex;gap:6px;margin:2px 0 14px}
.modeseg button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px;font-family:'Jost';font-size:13.5px;cursor:pointer;color:var(--soft)}
.modeseg button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
/* compass */
.cwrap{display:flex;flex-direction:column;align-items:center;padding-top:6px}
.cmpbox{position:relative;width:270px;max-width:80vw;aspect-ratio:1;margin:8px auto 0}
.cmp-idx{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:3}.cmp-idx svg{width:22px;height:22px;fill:var(--gold)}
.mdist{font-family:'Bodoni Moda',serif;font-size:30px;text-align:center;margin-top:16px;color:var(--ink)}
.mbear{font-size:13px;color:var(--gold);text-align:center;margin-top:3px;letter-spacing:1px}
.aligned{text-align:center;margin-top:14px;font-size:14px;color:var(--gold);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;min-height:20px}
.aligned svg{width:18px;height:18px;stroke:var(--gold)}
.cbtn{display:block;margin:16px auto 0;background:var(--ink);color:var(--paper);border:none;border-radius:30px;padding:12px 24px;font-family:'Jost';font-size:14px;cursor:pointer}
.set-seg{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.set-seg button{border:1px solid var(--line);background:var(--card);border-radius:30px;padding:9px 15px;font-family:'Jost';font-size:13px;cursor:pointer;color:var(--soft)}
.set-seg button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.seg-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.seg-card .sb{flex:1}
.seg-card .sn{font-size:15px;font-weight:500}
.seg-card .sc{font-size:13px;color:var(--gold);margin-top:3px}
.seg-card svg{width:18px;height:18px;stroke:var(--faint);transform:scaleX(-1);flex:none}
.cal-evt{display:flex;align-items:center;gap:13px;padding:14px 0;border-top:1px solid var(--line)}
.cal-evt:first-child{border-top:none}.cal-evt .ce-ic{width:38px;height:38px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}.cal-evt .ce-ic svg{width:20px;height:20px;stroke:var(--gold)}
.cal-evt .ce-t{flex:1;font-size:14.5px;font-weight:500}.cal-evt .ce-s{font-size:12px;color:var(--faint);margin-top:1px}
/* liquid glass nav */
.navwrap{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:center;pointer-events:none;padding:0 12px calc(env(safe-area-inset-bottom) + 10px);z-index:10}
.navbar{pointer-events:auto;display:flex;align-items:center;width:100%;max-width:480px;background:var(--navbg);backdrop-filter:blur(32px) saturate(190%);-webkit-backdrop-filter:blur(32px) saturate(190%);border:1px solid var(--navbd);border-radius:30px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.45)}
.navbar button{flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);padding:5px 0}
.navbar button svg{width:23px;height:23px;stroke:currentColor}
.navbar button .n{font-size:9.5px;font-weight:500}
.navbar button.on{color:var(--gold)}
.navc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.navc .circ{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-22px;border:3px solid var(--paper);transition:transform .2s,box-shadow .2s}
.navc.on .circ{transform:scale(1.04)}
.navc.prayers.on.fill .circ{background:var(--ink);box-shadow:0 6px 18px rgba(28,25,23,.35)}
.navc.prayers.on.fill .circ svg{stroke:var(--paper)}
.navc.prayers.on.fill .n{color:var(--ink);font-weight:700}
.navc.prayers:not(.on) .circ{background:var(--card);border:2px solid var(--line)}
.navc.prayers:not(.on) .circ svg{stroke:var(--soft)}
.navc.prayers:not(.on) .n{color:var(--faint);font-weight:500}
.navc.brachot.on.fill .circ{background:var(--gold);box-shadow:0 6px 18px rgba(161,98,7,.42)}
.navc.brachot.on.fill .circ svg{stroke:#fff}
.navc.brachot.on.fill .n{color:var(--gold);font-weight:700}
.navc.brachot:not(.on) .circ{background:var(--card);border:2px solid var(--line)}
.navc.brachot:not(.on) .circ svg{stroke:var(--soft)}
.navc.brachot:not(.on) .n{color:var(--faint);font-weight:500}
.navc .circ svg{width:23px;height:23px}
.navc .n{font-size:9.5px;font-weight:600}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px;gap:10px}
.cal-head button{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:20px;color:var(--soft);flex:none}
.cal-month{font-family:'Bodoni Moda',serif;font-size:22px;font-weight:600;text-align:center;flex:1;color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.cal-dow{font-size:10px;text-align:center;color:var(--faint);font-weight:500;padding:4px 0;letter-spacing:.3px}
.cal-day{aspect-ratio:1;border-radius:12px;border:1px solid transparent;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink);position:relative;gap:3px}
.cal-day.off{opacity:.25;pointer-events:none}
.cal-day.today{background:var(--cream);border-color:var(--gold);font-weight:600}
.cal-day.sel{background:var(--gold);color:#fff;border-color:var(--gold)}
.cal-day.sel .cal-heb{color:rgba(255,255,255,.85)}
.cal-heb{font-family:'Frank Ruhl Libre';font-size:9px;color:var(--gold);line-height:1}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);position:absolute;bottom:4px}
.cal-day.sel .cal-dot{background:#fff}
.cal-events{margin-top:4px}
.rtl .rt,.rtl .bt,.rtl .note,.rtl .tzc .tt,.rtl .seg-card{text-align:right}
.hidden{display:none!important}
#ob{position:absolute;inset:0;background:var(--paper);z-index:50;display:flex;flex-direction:column;justify-content:center;padding:36px 30px calc(env(safe-area-inset-bottom) + 36px)}
#ob .obhe{font-family:'Frank Ruhl Libre';color:var(--gold);font-size:28px;direction:rtl}
#ob h1{font-family:'Bodoni Moda',serif;font-size:25px;font-weight:600;margin-top:6px;color:var(--ink)}
#ob p{font-size:13px;color:var(--soft);margin-top:6px;line-height:1.5}
#ob .opts{margin-top:28px;display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:20px;overflow:hidden}
#ob .opts button{background:var(--card);border:none;padding:16px 20px;font-family:'Jost';font-size:15px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--ink)}
#ob .opts button span{font-family:'Frank Ruhl Libre';color:var(--faint);font-size:15px}
#ob small{display:block;margin-top:18px;color:var(--faint);font-size:12px;line-height:1.5}
#toast{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:30px;font-size:13px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none}
#toast.show{opacity:1}
/* prayer card */
.prayer-card{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden;margin:14px 0 14px}
.pc-label{font-size:9px;font-weight:500;letter-spacing:2.5px;color:var(--faint);text-transform:uppercase;padding:14px 20px 0}
.pc-body{display:flex;align-items:center;padding:8px 2px 2px}
.pc-nav{width:40px;height:44px;border:none;background:none;cursor:pointer;color:var(--faint);font-size:20px;flex:none;display:flex;align-items:center;justify-content:center}
.pc-main{flex:1;text-align:center;padding:2px 0}
.pc-name{font-family:'Bodoni Moda',serif;font-size:25px;font-weight:600;color:var(--ink);line-height:1.05}
.pc-count{font-size:12.5px;color:var(--gold);margin-top:4px;font-weight:500;min-height:16px}
.pc-wins{display:flex;justify-content:center;gap:14px;margin-top:8px;flex-wrap:wrap}
.pc-w{font-size:12px;color:var(--soft);display:flex;align-items:center;gap:5px}
.pc-w b{color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums}
.pc-wdot{width:4px;height:4px;border-radius:50%;background:var(--goldL);flex:none}
.pc-tabs{display:flex;border-top:1px solid var(--line);margin-top:10px}
.pc-tab{flex:1;border:none;background:transparent;padding:10px 4px;cursor:pointer;font-family:'Jost';font-size:11px;color:var(--faint);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:2px;transition:background .15s,color .15s}
.pc-tab:last-child{border-right:none}
.pc-tab.on{background:var(--cream);color:var(--ink)}
.pc-tab .pt-time{font-size:12px;font-variant-numeric:tabular-nums;font-weight:500;color:var(--gold)}
/* bookmarks */
.bm-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:14px}
.bm-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;cursor:pointer;display:flex;flex-direction:column;gap:5px;flex:1 1 120px;max-width:calc(50% - 4px);transition:border-color .2s,box-shadow .2s,opacity .2s,transform .15s;-webkit-user-select:none;user-select:none}
.bm-card:active{transform:scale(.96)}
.bm-card.bm-drag-over{border-color:var(--gold);box-shadow:0 0 0 2px rgba(161,98,7,.18)}
.bm-card.bm-dragging{opacity:.4;transform:scale(.97)}
.bm-ic{width:30px;height:30px;border-radius:9px;background:var(--cream);display:flex;align-items:center;justify-content:center;margin-bottom:1px}
.bm-ic svg{width:16px;height:16px;stroke:var(--gold)}
.bm-nm{font-size:13px;font-weight:500;color:var(--ink);line-height:1.2}
.bm-sub{font-size:10.5px;color:var(--faint)}
/* nav pills for prayers/brachot */
.nav-pill{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;cursor:pointer;padding:5px 0;border:none;background:transparent}
.nav-pill .np-ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}
.nav-pill .np-ic svg{width:20px;height:20px}
.nav-pill .n{font-size:9px;font-weight:600;letter-spacing:.3px}
.nav-pill.prayers:not(.on){color:var(--faint)}.nav-pill.prayers:not(.on) svg{stroke:var(--faint)}
.nav-pill.prayers.on{color:var(--ink)}.nav-pill.prayers.on .np-ic{background:var(--ink)}.nav-pill.prayers.on svg{stroke:var(--paper)}
.nav-pill.brachot:not(.on){color:var(--faint)}.nav-pill.brachot:not(.on) svg{stroke:var(--faint)}
.nav-pill.brachot.on{color:var(--gold)}.nav-pill.brachot.on .np-ic{background:var(--gold)}.nav-pill.brachot.on svg{stroke:#fff}
/* tehillim center fab */
.navc.tehillim .circ{background:linear-gradient(145deg,var(--gold),var(--goldL));box-shadow:0 4px 18px rgba(161,98,7,.38)}
.navc.tehillim:not(.on) .circ{background:linear-gradient(145deg,var(--cream),var(--card));box-shadow:none;border:1.5px solid var(--line)}
.navc.tehillim:not(.on) .circ svg{stroke:var(--faint)}
.navc.tehillim:not(.on) .n{color:var(--faint)}
.navc.tehillim.on .circ svg{stroke:#fff}
.navc.tehillim.on .n{color:var(--gold);font-weight:700}
/* zmanim categories */
.zcat{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:10px;overflow:hidden}
.zcat-head{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer}
.zcat-ic{width:36px;height:36px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}
.zcat-ic svg{width:19px;height:19px;stroke:var(--gold)}
.zcat-t{flex:1}.zcat-t .a{font-size:14.5px;font-weight:500;color:var(--ink)}.zcat-t .b{font-size:11.5px;color:var(--faint);margin-top:1px}
.zcat-chev{width:18px;height:18px;stroke:var(--faint);transition:transform .25s;flex:none}
.zcat.open .zcat-chev{transform:rotate(90deg)}
.zcat-body{display:none;padding:0 18px 6px}
.zcat.open .zcat-body{display:block}
.zrow{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.zrow .zn{flex:1;font-size:13.5px;color:var(--soft)}
.zrow .zh{font-family:'Frank Ruhl Libre',serif;font-size:14px;color:var(--faint);direction:rtl}
.zrow .zt{font-size:14px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums;flex:none}
.zrow.miss .zt{color:var(--faint)}
.znow{background:var(--cream);margin:0 -18px;padding-left:18px;padding-right:18px;border-radius:10px}
.znow .zt{color:var(--gold)}
.zrow.zsel{cursor:pointer;gap:11px}
.zradio{width:19px;height:19px;border-radius:50%;border:2px solid var(--line);flex:none;position:relative;align-self:center}
.zradio.on{border-color:var(--gold)}
.zradio.on::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--gold)}
.zrow.zsel.on .zn{color:var(--ink);font-weight:500}
.zrow.zsel.on .zt{color:var(--gold)}
/* full-screen reader */
#rdr{position:absolute;inset:0;z-index:8;display:none;flex-direction:column}
#rdr.show{display:flex}
.rdr-top{display:flex;align-items:center;gap:6px;padding:calc(env(safe-area-inset-top) + 8px) 14px 8px;flex:none;background:linear-gradient(to bottom,var(--rdr-top) 70%,transparent)}
.rdr-ic{width:38px;height:38px;border-radius:50%;border:none;background:var(--rdr-btn);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.rdr-ic svg{width:19px;height:19px;stroke:var(--rdr-fg)}
.rdr-title{flex:1;text-align:center;font-family:'Bodoni Moda',serif;font-size:17px;font-weight:600;color:var(--rdr-fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.rdr-body{flex:1;overflow-y:auto;padding:8px 26px 130px;-webkit-overflow-scrolling:touch}
.rdr-body::-webkit-scrollbar{display:none}
.rdr-body.rtl{direction:rtl;text-align:right}
.rdr-body{line-height:1.95}
.rdr-body .pn{font-family:'Bodoni Moda',serif;font-weight:600;color:var(--gold);text-align:center;margin:18px 0 16px;letter-spacing:.5px;font-size:.92em}
.rdr-body .vn{color:var(--gold);font-size:.6em;vertical-align:.2em;margin-inline-end:6px;font-family:'Bodoni Moda';opacity:.8}
.rdr-body .v{margin-bottom:.55em}
.rdr-body .rdesc{font-size:.72em;opacity:.7;text-align:center;margin-bottom:18px;line-height:1.6;font-family:'Jost',sans-serif}
.rdr-sheet-bd{position:absolute;inset:0;z-index:45;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s}
.rdr-sheet-bd.show{opacity:1;pointer-events:auto}
.rdr-sheet{position:absolute;left:0;right:0;bottom:0;z-index:46;background:var(--card);border-radius:26px 26px 0 0;padding:10px 22px calc(env(safe-area-inset-bottom) + 24px);transform:translateY(105%);transition:transform .32s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.rdr-sheet.show{transform:translateY(0)}
.rdr-grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:4px auto 14px}
.rdr-sheet h4{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);font-weight:500;margin:16px 2px 9px;font-family:'Jost'}
.rdr-sheet h4:first-of-type{margin-top:2px}
.sz-row{display:flex;align-items:center;gap:14px}
.sz-btn{width:50px;height:46px;border:1px solid var(--line);background:var(--cream);border-radius:14px;cursor:pointer;color:var(--ink);font-family:'Bodoni Moda',serif;font-weight:600;display:flex;align-items:center;justify-content:center}
.sz-btn.s{font-size:15px}.sz-btn.l{font-size:23px}
.sz-val{flex:1;text-align:center;font-size:15px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}
.opt-row{display:flex;gap:8px}
.opt{flex:1;border:1px solid var(--line);background:var(--cream);border-radius:14px;padding:12px 6px;cursor:pointer;text-align:center;color:var(--soft);font-size:13px;transition:all .15s}
.opt.on{border-color:var(--gold);color:var(--ink);background:var(--card);box-shadow:0 0 0 1.5px var(--gold) inset}
.opt .opt-aa{font-size:19px;display:block;margin-bottom:3px;color:var(--ink)}
.bg-row{display:flex;gap:10px;margin-bottom:22px}
.bg-sw{flex:1;aspect-ratio:1.3;border-radius:14px;cursor:pointer;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Frank Ruhl Libre',serif;font-size:18px;position:relative}
.bg-sw.on{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.bg-sw .bg-nm{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:9.5px;color:var(--faint)}
/* feedback */
.fb-field{margin-bottom:16px}
.fb-field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);font-weight:500;margin:0 2px 8px}
.fb-cats{display:flex;gap:8px;flex-wrap:wrap}
.fb-cat{border:1px solid var(--line);background:var(--card);border-radius:30px;padding:9px 15px;font-family:'Jost';font-size:13px;cursor:pointer;color:var(--soft)}
.fb-cat.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fb-input,.fb-textarea{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 15px;font-family:'Jost';font-size:14px;color:var(--ink);resize:none}
.fb-input:focus,.fb-textarea:focus{outline:none;border-color:var(--gold)}
.fb-textarea{min-height:120px;line-height:1.5}
.fb-send{width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:16px;padding:15px;font-family:'Jost';font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.fb-send:active{transform:scale(.99)}
.fb-stars{display:flex;gap:8px;justify-content:center;margin:2px 0}
.fb-star{font-size:30px;cursor:pointer;color:var(--line);transition:color .15s}
.fb-star.on{color:var(--gold)}
/* === v6 === */
/* quick actions (today top) */
.quickrow{display:flex;gap:7px;margin:14px 0 2px}
.qa{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 6px;background:transparent;border:1px solid var(--line);border-radius:11px;cursor:pointer;transition:transform .12s,background .15s}
.qa:active{transform:scale(.95);background:var(--cream)}
.qa .qa-ic{display:flex;flex:none}
.qa .qa-ic svg{width:15px;height:15px;stroke:var(--gold)}
.qa .qa-l{font-size:11.5px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* resume reading banner */
.resume{display:flex;align-items:center;gap:13px;background:linear-gradient(120deg,var(--cream),var(--card));border:1px solid var(--line);border-radius:18px;padding:13px 16px;margin:0 0 14px;cursor:pointer;transition:transform .12s}
.resume:active{transform:scale(.99)}
.resume .r-ic{width:42px;height:42px;border-radius:13px;background:linear-gradient(145deg,var(--gold),var(--goldL));display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 4px 12px rgba(161,98,7,.26)}
.resume .r-ic svg{width:20px;height:20px;fill:#fff;stroke:none}
.resume .r-t{flex:1;min-width:0}
.resume .r-t .a{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1.4px;font-weight:500}
.resume .r-t .b{font-size:15px;font-weight:500;color:var(--ink);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.resume .r-cv{width:18px;height:18px;stroke:var(--faint);flex:none;transform:scaleX(-1)}
.resume .r-close{width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer}
.resume .r-close svg{width:13px;height:13px;stroke:var(--soft)}
/* favorites edit */
.fav-head{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 12px;gap:9px}
.fav-head .fh-l{font-size:10.5px;font-weight:500;letter-spacing:2px;color:var(--faint);text-transform:uppercase;display:flex;align-items:center;gap:9px;flex:1}
.fav-head .fh-l .ln{flex:1;height:1px;background:var(--line)}
.fav-edit{font-size:13px;color:var(--gold);background:none;border:none;cursor:pointer;font-family:'Jost';font-weight:600;flex:none;padding:2px 4px}
.bm-grid.editing .bm-card{cursor:default}
.bm-grid.editing .bm-handle{touch-action:none}
.bm-card .bm-handle,.bm-card .bm-rm{display:none}
.bm-grid.editing .bm-handle{display:flex;position:absolute;top:7px;inset-inline-end:7px;width:26px;height:26px;align-items:center;justify-content:center;cursor:grab;touch-action:none;color:var(--faint)}
.bm-grid.editing .bm-handle svg{width:18px;height:18px;stroke:var(--faint)}
.bm-grid.editing .bm-rm{display:flex;position:absolute;top:-7px;inset-inline-start:-7px;width:24px;height:24px;border-radius:50%;background:var(--ink);align-items:center;justify-content:center;cursor:pointer;z-index:2;border:2px solid var(--paper)}
.bm-grid.editing .bm-rm svg{width:12px;height:12px;stroke:var(--paper);stroke-width:2.4}
.bm-card.bm-float{position:fixed;z-index:55;pointer-events:none;box-shadow:0 12px 30px rgba(0,0,0,.25);opacity:.96}
.bm-card.bm-ghost{opacity:.25}
.bm-add{flex:1 1 120px;max-width:calc(50% - 4px);border:1.5px dashed var(--line);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px;cursor:pointer;color:var(--faint);background:transparent;min-height:84px}
.bm-add svg{width:20px;height:20px;stroke:var(--gold)}.bm-add span{font-size:12px}
/* favorites add picker */
.pick-bd{position:absolute;inset:0;z-index:45;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s}
.pick-bd.show{opacity:1;pointer-events:auto}
.pick-sheet{position:absolute;left:0;right:0;bottom:0;z-index:46;background:var(--card);border-radius:26px 26px 0 0;padding:10px 20px calc(env(safe-area-inset-bottom) + 22px);transform:translateY(105%);transition:transform .32s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.2);max-height:70%;overflow-y:auto}
.pick-sheet.show{transform:translateY(0)}
.pick-sheet h4{font-family:'Bodoni Moda',serif;font-size:19px;text-align:center;margin:8px 0 14px;color:var(--ink)}
.pick-item{display:flex;align-items:center;gap:13px;padding:13px 4px;border-top:1px solid var(--line);cursor:pointer}
.pick-item:first-of-type{border-top:none}
.pick-item .pi-ic{width:38px;height:38px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}
.pick-item .pi-ic svg{width:19px;height:19px;stroke:var(--gold)}
.pick-item .pi-t{flex:1}.pick-item .pi-t .a{font-size:14.5px;font-weight:500}.pick-item .pi-t .b{font-size:12px;color:var(--faint)}
.pick-item .pi-add{width:26px;height:26px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}.pick-item .pi-add svg{width:15px;height:15px;stroke:var(--gold)}
/* tehillim books */
.book-sec{margin-bottom:24px}
.book-hdr{display:flex;align-items:center;gap:10px;margin:0 2px 12px}
.book-hdr .rn{font-family:'Bodoni Moda',serif;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(145deg,var(--gold),var(--goldL));width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;letter-spacing:-.5px}
.book-hdr .a{font-family:'Bodoni Moda',serif;font-size:18px;font-weight:600;color:var(--ink)}
.book-hdr .r{font-size:11.5px;color:var(--gold);font-family:'Jost';font-variant-numeric:tabular-nums}
.book-hdr .ln{flex:1;height:1px;background:linear-gradient(to var(--dir,right),var(--line),transparent);align-self:center}
.book-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.bnum{position:relative;aspect-ratio:1;border:1px solid var(--line);background:var(--card);border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;transition:transform .1s,box-shadow .15s}
.bnum:active{transform:scale(.9)}
html[data-theme="dark"] .bnum{box-shadow:0 1px 6px rgba(0,0,0,.2)}
.bnum.fav{border-color:var(--gold);background:linear-gradient(160deg,var(--cream),var(--card))}
.bnum .bdot{position:absolute;top:5px;inset-inline-end:6px;width:6px;height:6px;border-radius:50%;background:var(--gold)}
.bnum.on{background:var(--gold);color:#fff;border-color:var(--gold)}
/* zman main list + detail */
.zmain{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:12px}
.zmrow{display:flex;align-items:center;gap:13px;padding:15px 18px;border-top:1px solid var(--line);cursor:pointer}
.zmrow:first-child{border-top:none}.zmrow:active{background:var(--cream)}
.zm-ic{width:38px;height:38px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}
.zm-ic svg{width:20px;height:20px;stroke:var(--gold)}
.zm-t{flex:1;min-width:0}.zm-t .a{font-size:15px;font-weight:500;color:var(--ink)}.zm-t .b{font-size:12px;color:var(--faint);margin-top:1px}
.zm-time{font-size:16px;font-weight:600;color:var(--gold);font-variant-numeric:tabular-nums;flex:none}
.zm-time.miss{color:var(--faint)}
.zm-bell{width:7px;height:7px;border-radius:50%;background:var(--gold);flex:none;margin-inline-start:2px}
.zm-chev{width:17px;height:17px;stroke:var(--faint);flex:none;transform:scaleX(-1)}
.zbig{text-align:center;margin:6px 0 16px}
.zbig .t{font-family:'Bodoni Moda',serif;font-size:46px;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.zbig .h{font-family:'Frank Ruhl Libre',serif;font-size:18px;color:var(--gold);margin-top:6px}
.ztoggle{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 18px;margin:14px 0 8px}
.ztoggle .zt-ic{width:38px;height:38px;border-radius:11px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex:none}.ztoggle .zt-ic svg{width:19px;height:19px;stroke:var(--gold)}
.ztoggle .zt-t{flex:1}.ztoggle .zt-t .a{font-size:14.5px;font-weight:500;color:var(--ink)}.ztoggle .zt-t .b{font-size:11.5px;color:var(--faint);margin-top:1px}
.switch{width:48px;height:29px;border-radius:20px;background:var(--line);position:relative;flex:none;transition:background .22s;cursor:pointer}
.switch.on{background:var(--gold)}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:23px;height:23px;border-radius:50%;background:#fff;transition:transform .22s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.switch.on::after{transform:translateX(19px)}
/* theme auto icon fill follows soft */
.ctop-btn svg path[fill]{fill:var(--soft)}
/* reader zen mode */
.zen-exit{position:absolute;top:calc(env(safe-area-inset-top) + 10px);inset-inline-end:14px;z-index:9;width:36px;height:36px;border-radius:50%;background:var(--rdr-btn);border:none;display:none;align-items:center;justify-content:center;cursor:pointer}
.zen-exit svg{width:17px;height:17px;stroke:var(--rdr-fg)}
#rdr.zen .rdr-top{display:none}
#rdr.zen .zen-exit{display:flex}
#rdr.zen .rdr-body{padding-top:calc(env(safe-area-inset-top) + 30px);padding-bottom:40px}
body.zenmode .navwrap{display:none}
/* welcome — siddur cover */
#welcome{position:absolute;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:30px;background:radial-gradient(circle at 50% 30%,var(--cream),var(--paper) 70%);transition:opacity .6s ease;animation:welIn .8s ease both}
#welcome.hide{opacity:0;pointer-events:none}
@keyframes welIn{from{opacity:0}to{opacity:1}}
.wel-card{position:relative;width:100%;max-width:340px;padding:48px 30px 44px;text-align:center;border:1px solid var(--goldL);border-radius:22px;background:linear-gradient(170deg,var(--card),var(--cream));box-shadow:0 24px 60px rgba(0,0,0,.14),inset 0 0 0 4px var(--card),inset 0 0 0 5px rgba(161,98,7,.18)}
.wel-orn{display:flex;justify-content:center;margin-bottom:18px;animation:welUp .9s .15s both}
.wel-orn svg{width:62px;height:62px;filter:drop-shadow(0 3px 8px rgba(161,98,7,.25))}
.wel-he{font-family:'Frank Ruhl Libre',serif;font-size:30px;color:var(--gold);direction:rtl;animation:welUp .9s .25s both}
.wel-greet{font-family:'Bodoni Moda',serif;font-size:29px;font-weight:600;color:var(--ink);margin-top:12px;animation:welUp .9s .35s both}
.wel-date{font-size:14px;color:var(--soft);margin-top:10px;animation:welUp .9s .45s both}
.wel-date2{font-size:12.5px;color:var(--faint);margin-top:2px;animation:welUp .9s .5s both}
.wel-rule{display:flex;align-items:center;justify-content:center;gap:10px;margin:22px 0;color:var(--goldL);animation:welUp .9s .55s both}
.wel-rule span{height:1px;width:46px;background:linear-gradient(to right,transparent,var(--goldL))}
.wel-rule span:last-child{background:linear-gradient(to left,transparent,var(--goldL))}
.wel-pray{font-family:'Frank Ruhl Libre',serif;font-size:17px;color:var(--soft);line-height:1.5;animation:welUp .9s .65s both}
@keyframes welUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
/* liquid-glass nav v6 */
.navbar{position:relative}
.nav-ind{position:absolute;top:6px;bottom:6px;left:6px;width:calc((100% - 12px)/6);border-radius:20px;background:var(--navbd);box-shadow:0 2px 10px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.5);transition:transform .38s cubic-bezier(.32,.72,0,1);z-index:0;pointer-events:none}
.nav-item{position:relative;z-index:1;flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);padding:6px 0}
.nav-item .ni-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.nav-item .ni-ic svg{width:22px;height:22px;stroke:currentColor}
.nav-item .n{font-size:9.5px;font-weight:500}
.nav-item:active .ni-ic{transform:scale(1.22)}
.nav-item.on{color:var(--gold)}
.nav-item.on .n{font-weight:700}
.nav-item.emph{color:var(--gold)}
.nav-item.emph .ni-ic{background:var(--cream);box-shadow:inset 0 0 0 1.5px rgba(161,98,7,.22)}
.nav-item.emph .ni-ic svg{stroke:var(--gold)}
.nav-item.emph .n{font-weight:600}
.nav-item.emph.on .ni-ic{background:linear-gradient(150deg,var(--gold),var(--goldL));box-shadow:0 4px 12px rgba(161,98,7,.34)}
.nav-item.emph.on .ni-ic svg{stroke:#fff}
html[data-theme="dark"] .nav-item.emph .ni-ic{box-shadow:inset 0 0 0 1.5px rgba(203,162,80,.3)}
/* === v8 polish === */
/* screen + reader transitions */
@keyframes scrIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.scr.anim{animation:scrIn .34s cubic-bezier(.32,.72,0,1)}
@keyframes rdrIn{from{opacity:0}to{opacity:1}}
#rdr.show{animation:rdrIn .3s ease}
/* welcome cover shows instantly (no backdrop fade-in over content) */
#welcome{animation:none}
/* consistent vertical rhythm on Today */
.quickrow{margin:16px 0 0}
.prayer-card{margin:16px 0}
.bigtiles{margin:14px 0!important}
.tehil{margin:0 0 14px}
.fav-head{margin:24px 2px 14px}
/* liquid-glass nav lens */
.navbar{touch-action:none}
.nav-ind{background:linear-gradient(160deg,rgba(255,255,255,.62),rgba(255,255,255,.12));border:1px solid rgba(255,255,255,.7);box-shadow:0 6px 16px rgba(0,0,0,.14),inset 0 1.6px 0 rgba(255,255,255,.9),inset 0 -2px 5px rgba(0,0,0,.06);backdrop-filter:blur(5px) saturate(170%);-webkit-backdrop-filter:blur(5px) saturate(170%);transition:transform .34s cubic-bezier(.32,.72,0,1)}
html[data-theme="dark"] .nav-ind{background:linear-gradient(160deg,rgba(255,255,255,.18),rgba(255,255,255,.03));border-color:rgba(255,255,255,.2);box-shadow:0 6px 16px rgba(0,0,0,.32),inset 0 1.6px 0 rgba(255,255,255,.24)}
.nav-item .ni-ic{transition:transform .24s cubic-bezier(.32,.72,0,1)}
.nav-item.lensed{color:var(--gold)}
.nav-item.lensed .ni-ic{transform:scale(1.2) translateY(-2px)}
.nav-item.lensed .n{font-weight:700}
/* emphasised prayers/brachot — premium gold pills */
.nav-item.emph .ni-ic{width:36px;height:36px;margin-top:-3px}
.nav-item.emph .ni-ic svg{width:21px;height:21px}
.nav-item.emph:not(.on) .ni-ic{background:linear-gradient(160deg,var(--cream),var(--card));box-shadow:inset 0 0 0 1.6px rgba(161,98,7,.32),0 3px 8px rgba(161,98,7,.14)}
.nav-item.emph.on .ni-ic{transform:scale(1.06) translateY(-2px)}
.nav-item.emph.lensed .ni-ic{transform:scale(1.14) translateY(-3px)}
.nav-item.emph .n{letter-spacing:.2px}
/* compact prayer card */
.prayer-card .pc-name{font-size:23px}
.pc-body{cursor:pointer;padding:10px 18px 12px;gap:8px}
.pc-main{flex:1}
.pc-count{font-family:'Bodoni Moda',serif;font-size:21px;font-weight:600;color:var(--gold);margin-top:3px;font-variant-numeric:tabular-nums}
.pc-status{font-size:11px;color:var(--faint);margin-top:2px;letter-spacing:.3px}
.pc-status.live{color:var(--gold)}
.pc-cv{width:17px;height:17px;stroke:var(--faint);flex:none;transform:scaleX(-1)}
.pc-tab{padding:11px 4px}
/* bookmarks edit — drag whole card, clear affordances */
.bm-grid.editing .bm-card{touch-action:none;cursor:grab;border-style:dashed;border-color:var(--goldL);box-shadow:0 0 0 1px rgba(161,98,7,.08)}
.bm-grid.editing .bm-card:active{cursor:grabbing}
.bm-grid.editing .bm-handle{color:var(--gold)}
.bm-grid.editing .bm-handle svg{stroke:var(--gold)}
/* reader bookmark button */
#rdrBm svg{transition:fill .15s,stroke .15s}
</style>

/* resume reading */
let lastRead=null;try{lastRead=JSON.parse(localStorage.getItem('lastRead')||'null');}catch(e){}
let _restoreScroll=null;
function saveLastRead(kind,ref,title){lastRead={kind,ref,title,scroll:0,ts:Date.now()};localStorage.setItem('lastRead',JSON.stringify(lastRead));}
function saveReadScroll(){if(!lastRead)return;const b=document.getElementById('rdrBody');if(!b)return;lastRead.scroll=b.scrollTop;localStorage.setItem('lastRead',JSON.stringify(lastRead));}
function resumeBannerHtml(){if(!lastRead||(Date.now()-lastRead.ts)>3*864e5)return '';const d=L[lang];return `<div class="resume" onclick="resumeRead()"><span class="r-ic">${svg('play')}</span><div class="r-t"><div class="a">${d.resumeTitle}</div><div class="b">${lastRead.title||''}</div></div><button class="r-close" onclick="event.stopPropagation();dismissResume()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">${ICON.close}</svg></button></div>`;}
window.resumeRead=function(){if(!lastRead)return;_restoreScroll=lastRead.scroll||0;const k=lastRead.kind,r=lastRead.ref;if(k==='day')readDay(r);else if(k==='psalm')readPsalm(r);else if(k==='segula')openSegula(r);else if(k==='bracha')openBracha(r);};
window.dismissResume=function(){lastRead=null;localStorage.removeItem('lastRead');render();};

/* tehillim */
let tehMode='book',tehTitleCur='',tehChapters=[];
let tehFav=[];try{tehFav=JSON.parse(localStorage.getItem('tehFav')||'[]');}catch(e){}
function saveTehFav(){localStorage.setItem('tehFav',JSON.stringify(tehFav));}
window.toggleTehFav=function(n){const i=tehFav.indexOf(n);if(i>=0)tehFav.splice(i,1);else tehFav.push(n);tehFav.sort((a,b)=>a-b);saveTehFav();updateRdrHeart();if(cur==='tehillim')render();};
function curPsalm(){return (cur==='tehread'&&tehChapters.length===1)?tehChapters[0]:null;}
function updateRdrHeart(){const h=document.getElementById('rdrHeart');if(!h)return;const n=curPsalm();if(n==null){h.classList.add('hidden');return;}h.classList.remove('hidden');const on=tehFav.indexOf(n)>=0;h.querySelector('svg').setAttribute('fill',on?'var(--gold)':'none');h.querySelector('svg').style.stroke=on?'var(--gold)':'var(--rdr-fg)';}
window.toggleRdrFav=function(){const n=curPsalm();if(n!=null)toggleTehFav(n);};
const tehCache={};
let psalmsRu=null;
async function loadPsalmsRu(){if(psalmsRu)return psalmsRu;const r=await fetch('https://raw.githubusercontent.com/maatheusgois/bible/main/versions/ru/synodal/ps/ps.json');if(!r.ok)throw new Error('ru');psalmsRu=(await r.json()).chapters;return psalmsRu;}
function cleanHe(a){return(Array.isArray(a)?a:[]).map(s=>String(s).replace(/<[^>]+>/g,'').replace(/&[^;]+;/g,' ').trim());}
async function fetchPsalm(n){if(tehCache[n])return tehCache[n];const r=await fetch('https://www.sefaria.org/api/texts/Psalms.'+n+'?context=0');if(!r.ok)throw new Error('net');const j=await r.json();const he=cleanHe(j.he);let ru=[];try{const ch=await loadPsalmsRu();if(ch&&ch[n-1])ru=ch[n-1];}catch(e){}tehCache[n]={he,ru,translit:he.map(toTranslit)};return tehCache[n];}
function chaptersForDay(day){const rng=TEHILLIM[day];if(!rng)return[];if(rng.indexOf('–')<0)return[parseInt(rng)];const[a,b]=rng.split('–').map(s=>parseInt(s));const out=[];for(let i=a;i<=b;i++)out.push(i);return out;}
function psalmLines(p,mode){if(mode==='he')return p.he;if(mode==='translit')return p.translit;if(mode==='ru')return p.ru&&p.ru.length?p.ru:p.translit;return p.he;}
window.setTehMode=function(m){tehMode=m;render();};
window.openTehillim=function(){readDay(hebDay()>30?30:hebDay());};
window.readDay=function(day){segulaDesc='';tehTitleCur=L[lang].tehDay+' '+day;tehChapters=chaptersForDay(day);saveLastRead('day',day,tehTitleCur);if(cur!=='tehread')hist.push(cur);cur='tehread';renderTehread();};
window.readPsalm=function(n){segulaDesc='';tehTitleCur=L[lang].psalm+' '+n;tehChapters=[n];saveLastRead('psalm',n,tehTitleCur);if(cur!=='tehread')hist.push(cur);cur='tehread';renderTehread();};
async function renderTehread(){const d=L[lang];__rerender=renderTehread;const rtl=(tehLang==='he');
 document.getElementById('rdrTitle').textContent=tehTitleCur||d.t_teh;
 const body=document.getElementById('rdrBody');body.className='rdr-body'+(rtl?' rtl':'');body.dir=rtl?'rtl':'ltr';
 applyReaderStyle();showReader();renderNav();updateRdrHeart();updateRdrBm();body.scrollTop=0;
 body.innerHTML=`${segulaDesc?`<div class="rdesc">${segulaDesc}</div>`:''}<div class="loading">…</div>`;
 let html=segulaDesc?`<div class="rdesc">${segulaDesc}</div>`:'';
 for(const n of tehChapters){try{const p=await fetchPsalm(n);const lines=psalmLines(p,tehLang);if(!lines.length){html+=`<div class="rdesc">${d.psalm} ${n}: ${lang==='ru'?'нет текста':'אין טקסט'}</div>`;continue;}
  html+=`<div class="pn">${d.psalm} ${n}</div>`;for(let i=0;i<lines.length;i++)html+=`<div class="v"><span class="vn">${i+1}</span>${lines[i]||''}</div>`;
  if(tehLang==='ru'&&(!p.ru||!p.ru.length))html+=`<div class="rdesc" style="margin-top:6px">${lang==='ru'?'Русский перевод недоступен — показана транслитерация.':'תרגום רוסי לא זמין.'}</div>`;
 }catch(e){html+=`<div class="rdesc">${d.psalm} ${n}: ${lang==='ru'?'нужна сеть при первом открытии':'דרושה רשת'}</div>`;}}
 if(cur==='tehread'&&document.getElementById('rdrBody')){document.getElementById('rdrBody').innerHTML=html||`<div class="rdesc">${d.soonTxt}</div>`;if(_restoreScroll){document.getElementById('rdrBody').scrollTop=_restoreScroll;_restoreScroll=null;}}
}
window.setTehLang=function(l){setRdrLang(l);};

/* segula */

/* calendar — Hebcal API (publicapi.dev/hebrew-calendar-api) */
function calYmd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function calMonthLabel(d){return new Intl.DateTimeFormat(L[lang].locale,{month:'long',year:'numeric'}).format(d);}
function hebParts(y,m,d){try{const p=new Intl.DateTimeFormat(L[lang].locale+'-u-ca-hebrew',{day:'numeric',month:'short'}).formatToParts(new Date(y,m-1,d));let day='',mon='';p.forEach(x=>{if(x.type==='day')day=x.value;if(x.type==='month')mon=x.value});return{day,mon};}catch(e){return{day:'',mon:''};}}
window.calNav=function(d){calView=new Date(calView.getFullYear(),calView.getMonth()+d,1);calSel=null;renderCalendar();};
window.calPick=function(ymd){calSel=ymd;renderCalendar();};
async function renderCalendar(){const d=L[lang];__rerender=renderCalendar;const body=document.getElementById('calbody');if(!body)return;
 const y=calView.getFullYear(),m=calView.getMonth()+1;const lat=loc?loc.lat:59.93,lng=loc?loc.lng:30.31;
 const today=calYmd(new Date());if(!calSel)calSel=today;
 try{
  const r=await fetch(`https://www.hebcal.com/hebcal?v=1&cfg=json&month=${m}&year=${y}&maj=on&min=on&nx=on&mf=on&ss=on&o=on&c=on&geo=pos&latitude=${lat}&longitude=${lng}&tzid=${encodeURIComponent(TZID)}`);
  if(!r.ok)throw new Error('net');const j=await r.json();const items=j.items||[];
  const evMap={};items.forEach(it=>{const k=(it.date||'').slice(0,10);if(k){if(!evMap[k])evMap[k]=[];evMap[k].push(it);}});
  const first=new Date(y,m-1,1),startWd=(first.getDay()+6)%7,dim=new Date(y,m,0).getDate();
  const dows=lang==='he'?['ב','ג','ד','ה','ו','ש','א']:['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let grid='<div class="cal-grid">'+dows.map(w=>`<div class="cal-dow">${w}</div>`).join('');
  for(let i=0;i<startWd;i++)grid+=`<div class="cal-day off"></div>`;
  for(let day=1;day<=dim;day++){const ymd=`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const hp=hebParts(y,m,day);const cls=['cal-day'];if(ymd===today)cls.push('today');if(ymd===calSel)cls.push('sel');grid+=`<div class="${cls.join(' ')}" onclick="calPick('${ymd}')"><span>${day}</span>${hp.day?`<span class="cal-heb">${hp.day}</span>`:''}${evMap[ymd]?'<span class="cal-dot"></span>':''}</div>`;}
  grid+='</div>';
  let evHtml='';const selEv=evMap[calSel]||[];
  if(selEv.length){evHtml=`<div class="lbl">${d.calEvents}<span class="ln"></span></div><div class="group" style="padding:0 18px">`;selEv.forEach(it=>{const ic=it.category==='candles'?'flame':it.category==='omer'?'sparkle':it.category==='parashat'?'book':it.category==='roshchodesh'?'moon':it.category==='holiday'?'star':'calendar';const sub=it.category==='candles'?(it.title.replace(/[^0-9:]/g,'')||''):(it.hebrew||'');const title=lang==='he'?(it.hebrew||it.title):it.title;evHtml+=`<div class="cal-evt"><span class="ce-ic">${svg(ic)}</span><div><div class="ce-t">${title}</div>${sub&&lang!=='he'?`<div class="ce-s">${sub}</div>`:''}</div></div>`;});evHtml+='</div>';}
  else evHtml=`<div class="note">${lang==='ru'?'Нет особых событий':'אין אירועים מיוחדים'}</div>`;
  const selD=new Date(calSel),selHp=hebParts(selD.getFullYear(),selD.getMonth()+1,selD.getDate());
  const hebSel=selHp.day&&selHp.mon?`${selHp.day} ${selHp.mon}`:hebDate();
  body.innerHTML=`<div class="card" style="padding:16px 18px;margin-bottom:12px"><div class="date" style="font-size:26px">${hebSel}</div><div class="greg">${selD.toLocaleDateString(L[lang].locale,{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div><div class="cal-head"><button onclick="calNav(-1)">‹</button><div class="cal-month">${calMonthLabel(calView)}</div><button onclick="calNav(1)">›</button></div>${grid}<div class="cal-events">${evHtml}</div><div class="note" style="margin-top:10px;text-align:center;font-size:11px">Hebcal · ${lang==='ru'?'еврейский календарь':'לוח עברי'}</div>`;
 }catch(e){body.innerHTML=`<div class="note">${d.calErr}</div>`;}
}

function previewNav(i){const ind=nav.querySelector('.nav-ind');if(ind)ind.style.transform=`translateX(${i*100}%)`;nav.querySelectorAll('.nav-item').forEach((b,j)=>b.classList.toggle('lensed',j===i));}
function setupNavDrag(){if(nav._dragSet)return;nav._dragSet=1;let dragging=false;const n=ROOTS.length;
 const idxAt=x=>{const r=nav.getBoundingClientRect(),pad=6,w=(r.width-2*pad)/n;return Math.max(0,Math.min(n-1,Math.floor((x-r.left-pad)/w)));};

let _bd=null;
/* drag from anywhere on the card (touch-friendly); the X stays a tap target */
function bmDragSetup(){const grid=document.getElementById('bmgrid');if(!grid||!editFav)return;grid.querySelectorAll('.bm-card').forEach(card=>card.addEventListener('pointerdown',e=>{if(e.target.closest('.bm-rm'))return;bmDragStart(e,card);}));}
function bmDragStart(e,card){e.preventDefault();const grid=document.getElementById('bmgrid');const r=card.getBoundingClientRect();
 try{card.setPointerCapture(e.pointerId);}catch(_){}
 const float=card.cloneNode(true);float.classList.add('bm-float');float.style.width=r.width+'px';float.style.height=r.height+'px';float.style.left=r.left+'px';float.style.top=r.top+'px';document.body.appendChild(float);
 card.classList.add('bm-ghost');_bd={card,float,offx:e.clientX-r.left,offy:e.clientY-r.top};
 const move=ev=>{ev.preventDefault();_bd.float.style.left=(ev.clientX-_bd.offx)+'px';_bd.float.style.top=(ev.clientY-_bd.offy)+'px';
  const cards=[...grid.querySelectorAll('.bm-card')];
  for(const c of cards){if(c===_bd.card)continue;const cr=c.getBoundingClientRect();
   if(ev.clientX>cr.left&&ev.clientX<cr.right&&ev.clientY>cr.top&&ev.clientY<cr.bottom){
    const after=(_bd.card.compareDocumentPosition(c)&Node.DOCUMENT_POSITION_FOLLOWING);
    grid.insertBefore(_bd.card,after?c.nextSibling:c);break;}}};
 const up=ev=>{card.removeEventListener('pointermove',move);card.removeEventListener('pointerup',up);card.removeEventListener('pointercancel',up);try{card.releasePointerCapture(ev.pointerId);}catch(_){}
  if(_bd&&_bd.float)_bd.float.remove();const grid2=document.getElementById('bmgrid');if(grid2){bmOrder=[...grid2.querySelectorAll('.bm-card')].map(c=>c.dataset.bmid);bmSave();}_bd=null;render();};
 card.addEventListener('pointermove',move);card.addEventListener('pointerup',up);card.addEventListener('pointercancel',up);}
/* add the open text (bracha / psalm / day / segula) to Today favorites */
function curFavId(){if(!(cur==='tehread'||cur.startsWith('bread_'))||!lastRead)return null;const k=lastRead.kind,r=lastRead.ref;if(k==='bracha')return 'bracha:'+r;if(k==='psalm')return 'psalm:'+r;if(k==='day')return 'day:'+r;if(k==='segula')return 'seg:'+r;return null;}
function updateRdrBm(){const el=document.getElementById('rdrBm');if(!el)return;const id=curFavId();if(!id){el.classList.add('hidden');return;}el.classList.remove('hidden');const on=bmOrder.indexOf(id)>=0;const s=el.querySelector('svg');if(s){s.setAttribute('fill',on?'var(--gold)':'none');s.style.stroke=on?'var(--gold)':'var(--rdr-fg)';}}
window.toggleReaderFav=function(){const id=curFavId();if(!id)return;const i=bmOrder.indexOf(id);if(i>=0){bmOrder.splice(i,1);toast(L[lang].favRemoved);}else{bmOrder.push(id);toast(L[lang].favAdded);}bmSave();updateRdrBm();};

/* onboarding */
function showOnboarding(){const d=L[lang];ob.innerHTML=`<div class="obhe">שבת אחים גם יחד</div><h1>${d.onbTitle}</h1><p>${d.onbSub}</p><div class="opts">${Object.keys(NUSACH).map(k=>`<button onclick="pickNusach('${k}')">${NUSACH[k][lang]} <span>${NUSACH[k].he}</span></button>`).join('')}</div><small>${d.onbHint}</small>`;ob.classList.remove('hidden');}
window.pickNusach=function(k){nusach=k;localStorage.setItem('nusach',k);ob.classList.add('hidden');render();showWelcome();};

/* welcome greeting — siddur cover, auto-enters */
function greetKey(){const h=new Date().getHours();return h<5?'greetN':h<12?'greetM':h<18?'greetD':'greetE';}
const MAGEN_GOLD='<svg viewBox="0 0 24 24" fill="none"><polygon points="12,2.6 21,17.4 3,17.4" fill="none" stroke="var(--gold)" stroke-width="1.4" stroke-linejoin="round"/><polygon points="12,21.4 3,6.6 21,6.6" fill="none" stroke="var(--gold)" stroke-width="1.4" stroke-linejoin="round"/></svg>';
function showWelcome(){const d=L[lang];const w=document.getElementById('welcome');
 w.innerHTML=`<div class="wel-card"><div class="wel-orn">${MAGEN_GOLD}</div><div class="wel-he">${d.welHe}</div><div class="wel-greet">${d[greetKey()]}</div><div class="wel-date">${hebDate()}</div><div class="wel-date2">${gregDate()}</div><div class="wel-rule"><span></span>✦<span></span></div><div class="wel-pray">${d.welPray}</div></div>`;
 w.classList.remove('hidden','hide');w.onclick=closeWelcome;
 clearTimeout(w._t);w._t=setTimeout(closeWelcome,2800);}
window.closeWelcome=function(){const w=document.getElementById('welcome');if(w.classList.contains('hide')||w.classList.contains('hidden'))return;clearTimeout(w._t);w.classList.add('hide');setTimeout(()=>w.classList.add('hidden'),600);};

/* swipe back (edge) */
let _tsx=0,_tsy=0,_tst=0,_navTouch=false;
document.addEventListener('touchstart',e=>{const t=e.touches[0];_tsx=t.clientX;_tsy=t.clientY;_tst=Date.now();_navTouch=!!(e.target.closest&&e.target.closest('.navbar'));},{passive:true});
document.addEventListener('touchend',e=>{if(_navTouch)return;const t=e.changedTouches[0];const dx=t.clientX-_tsx,dy=t.clientY-_tsy,dt=Date.now()-_tst;
 if(_tsx<=42&&dx>70&&Math.abs(dy)<55&&dt<650){if(document.getElementById('rdrSheet').classList.contains('show')||document.getElementById('favPick').classList.contains('show'))return;if(zenOn){toggleZen();return;}back();}},{passive:true});

window.__zReady=function(){if(nusach){applyTheme();render();scheduleReminders();}};
applyTheme();requestLocation();
render();
if(!nusach)showOnboarding();else showWelcome();
scheduleReminders();
setInterval(()=>{if(cur==='today'||cur==='zmanim'){applyTheme();render();}},60000);
setInterval(scheduleReminders,30*60000);
if(location.search.indexOf('nosw')<0&&'serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
