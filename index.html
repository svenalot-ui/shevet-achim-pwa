:root{--paper:#FAFAF9;--card:#fff;--cream:#F1EFEA;--gold:#A16207;--goldL:#BFA46F;--ink:#1C1917;--soft:#57534E;--faint:#A8A29E;--line:#E3DFD8}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Jost',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
#app{position:relative;height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 10px) 20px 6px;color:var(--soft);flex:none;z-index:5}
.top svg{width:22px;height:22px;stroke:var(--soft);cursor:pointer}
.glob{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--soft);border:1px solid var(--line);padding:5px 12px;border-radius:30px}
.glob svg{width:15px;height:15px}
.scr{flex:1;overflow-y:auto;padding:2px 20px 120px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--soft);font-size:14px;cursor:pointer;margin:6px 0 4px;border:none;background:none;padding:6px 2px}
.back svg{width:19px;height:19px;stroke:var(--soft)}
.lbl{font-size:10.5px;font-weight:500;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin:22px 2px 12px;display:flex;align-items:center;gap:9px}
.lbl .ln{flex:1;height:1px;background:var(--line)}
.h1{font-family:'Bodoni Moda',serif;font-size:30px;font-weight:600;line-height:1.06}
.date{font-family:'Bodoni Moda',serif;font-size:33px;font-weight:600;line-height:1.05}
.greg{font-size:13px;color:var(--soft);margin-top:4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:14px}
.hero{text-align:center;padding:22px 16px 22px}
.hrow{display:flex;align-items:center;justify-content:center;gap:6px}
.chev{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--soft);cursor:pointer;font-size:18px;flex:none}
.pname{font-family:'Bodoni Moda',serif;font-size:28px;font-weight:600;flex:1}
.count{font-size:14px;color:var(--gold);margin-top:8px;font-weight:500;min-height:18px}
.win{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;display:flex;flex-direction:column;gap:9px}
.wrow{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--soft)}
.wrow b{color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums}
.dot{width:5px;height:5px;border-radius:50%;background:var(--goldL)}
.bigtiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.bt{border:none;border-radius:20px;padding:18px 16px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:10px;min-height:96px;justify-content:space-between}
.bt.dark{background:var(--ink);color:#fff}.bt.dark svg{stroke:var(--goldL)}
.bt.light{background:var(--card);color:var(--ink);border:1px solid var(--line)}.bt.light svg{stroke:var(--gold)}
.bt svg{width:26px;height:26px}
.bt .bn{font-size:16px;font-weight:500}
.bt .bh{font-family:'Frank Ruhl Libre';font-size:13px;opacity:.7;margin-top:-4px}
.tehil{display:flex;align-items:center;gap:14px;background:linear-gradient(0deg,var(--cream),var(--cream));border:1px solid var(--line);border-radius:20px;padding:15px 18px;cursor:pointer;margin-bottom:14px}
.tehil .tn{width:42px;height:42px;border-radius:13px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Bodoni Moda';font-size:18px;flex:none}
.tehil .tt{flex:1}.tehil .tt .a{font-size:14.5px;font-weight:500}.tehil .tt .b{font-size:12.5px;color:var(--soft);margin-top:1px}
.tehil svg{width:18px;height:18px;stroke:var(--faint)}
.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tool{background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 0}
.tc{width:56px;height:56px;border-radius:18px;background:var(--cream);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.tc svg{width:24px;height:24px;stroke:var(--gold)}
.tl{font-size:11px;color:var(--soft);text-align:center;line-height:1.25}
.group{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden}
.row{display:flex;align-items:center;padding:15px 18px;border-top:1px solid var(--line);cursor:pointer;gap:13px}
.row:first-child{border-top:none}
.row:active{background:var(--cream)}
.ricon{width:40px;height:40px;border-radius:12px;background:var(--cream);display:flex;align-items:center;justify-content:center;color:var(--gold);flex:none}
.ricon svg{width:21px;height:21px;stroke:var(--gold)}
.rt{flex:1}
.rt .nm{font-size:15px;font-weight:500}
.rt .sub{font-size:12px;color:var(--faint);margin-top:1px}
.he{font-family:'Frank Ruhl Libre',serif;font-size:17px}
.time{font-size:14px;color:var(--soft);font-variant-numeric:tabular-nums}
.soon{font-size:11px;color:var(--faint)}
.star{display:flex;color:var(--gold)}.star svg{width:17px;height:17px;stroke:var(--gold)}
.ch{color:var(--faint);font-size:18px}
.tz{background:var(--ink);color:#fff;border-radius:22px;padding:20px;margin-bottom:14px}
.tz .tzt{font-family:'Bodoni Moda';font-size:19px;display:flex;align-items:center;gap:9px}
.tz .tzt svg{width:22px;height:22px;stroke:var(--goldL)}
.tz p{font-size:13px;color:#d8d2c7;margin-top:8px;line-height:1.6}
.tz .acc{margin-top:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 14px;font-size:13px}
.tz .acc b{font-weight:500}
.tz .accrow{display:flex;justify-content:space-between;gap:10px;padding:3px 0;color:#e9e4d8}
.note{font-size:12.5px;color:var(--soft);line-height:1.6;padding:2px 2px}
/* compass */
.cwrap{display:flex;flex-direction:column;align-items:center;padding-top:8px}
.cmpbox{position:relative;width:268px;height:268px;margin:6px auto 0}
.cmp-idx{position:absolute;top:-3px;left:50%;transform:translateX(-50%);z-index:3}
.cmp-idx svg{width:20px;height:20px;fill:var(--gold)}
.mdist{font-family:'Bodoni Moda',serif;font-size:30px;text-align:center;margin-top:16px}
.mbear{font-size:13px;color:var(--gold);text-align:center;margin-top:3px;letter-spacing:1px}
.aligned{text-align:center;margin-top:14px;font-size:14px;color:var(--gold);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;min-height:20px}
.aligned svg{width:18px;height:18px;stroke:var(--gold)}
.cbtn{display:block;margin:16px auto 0;background:var(--ink);color:#fff;border:none;border-radius:30px;padding:12px 24px;font-family:'Jost';font-size:14px;cursor:pointer}
.set-seg{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.set-seg button{border:1px solid var(--line);background:var(--card);border-radius:30px;padding:9px 15px;font-family:'Jost';font-size:13px;cursor:pointer;color:var(--soft)}
.set-seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
/* liquid glass nav */
.navwrap{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:center;pointer-events:none;padding:0 12px calc(env(safe-area-inset-bottom) + 10px);z-index:10}
.navbar{pointer-events:auto;display:flex;align-items:flex-end;gap:0;width:100%;max-width:480px;background:rgba(250,250,249,.62);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:7px 6px;box-shadow:0 10px 34px rgba(28,25,23,.16),inset 0 1px 0 rgba(255,255,255,.5)}
.navbar button{flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);padding:5px 0}
.navbar button svg{width:23px;height:23px;stroke:currentColor}
.navbar button .n{font-size:9.5px;font-weight:500}
.navbar button.on{color:var(--gold)}
.navc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.navc .circ{width:52px;height:52px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;margin-top:-24px;border:3px solid rgba(250,250,249,.85);box-shadow:0 6px 16px rgba(161,98,7,.4)}
.navc .circ svg{width:24px;height:24px;stroke:#fff}
.navc .n{font-size:9.5px;font-weight:600;color:var(--gold)}
.rtl{direction:rtl}.rtl .rt,.rtl .bt,.rtl .tz,.rtl .note{text-align:right}.rtl .row{flex-direction:row}
.hidden{display:none!important}
/* onboarding */
#ob{position:absolute;inset:0;background:var(--paper);z-index:50;display:flex;flex-direction:column;justify-content:center;padding:36px 30px calc(env(safe-area-inset-bottom) + 36px)}
#ob .obhe{font-family:'Frank Ruhl Libre';color:var(--gold);font-size:28px;direction:rtl}
#ob h1{font-family:'Bodoni Moda',serif;font-size:25px;font-weight:600;margin-top:6px}
#ob p{font-size:13px;color:var(--soft);margin-top:6px;line-height:1.5}
#ob .opts{margin-top:28px;display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:20px;overflow:hidden}
#ob .opts button{background:var(--card);border:none;padding:16px 20px;font-family:'Jost';font-size:15px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--ink)}
#ob .opts button:active{background:var(--cream)}
#ob .opts button span{font-family:'Frank Ruhl Libre';color:var(--faint);font-size:15px}
#ob small{display:block;margin-top:18px;color:var(--faint);font-size:12px;line-height:1.5}
</style>
</head>

/* ---------- zmanim via KosherJava (kosher-zmanim) ---------- */
function parseT(s){return (s&&s!=='N/A')?new Date(s):null;}
function getZmanim(){
 if(!loc) return null;
 try{
  if(window.KosherZmanim&&window.KosherZmanim.getZmanimJson){
   const j=window.KosherZmanim.getZmanimJson({date:new Date(),locationName:'',latitude:loc.lat,longitude:loc.lng,elevation:0,timeZoneId:TZID,complexZmanim:true});
   const z=j.Zmanim;
   const sr=parseT(z.Sunrise),ss=parseT(z.Sunset);
   return {
    alot:parseT(z.Alos72), misheyakir:parseT(z.Misheyakir11Point5Degrees)||parseT(z.Alos60)||(sr?new Date(+sr-50*60000):null), netz:sr,
    sofShma:parseT(z.SofZmanShmaGRA), sofTfila:parseT(z.SofZmanTfilaGRA), chatzot:parseT(z.Chatzos),
    minchaG:parseT(z.MinchaGedola), minchaK:parseT(z.MinchaKetana), plag:parseT(z.PlagHamincha),
    shkia:ss, tzeit:parseT(z.Tzais)||parseT(z.Tzais72)
   };
  }
 }catch(e){}
 return noaaZmanim();
}
function noaaZmanim(){ // офлайн-фолбэк
 const base=new Date(),rad=Math.PI/180,deg=180/Math.PI;
 function ev(elev,morning){const start=Date.UTC(base.getUTCFullYear(),0,0);const n=(Date.UTC(base.getUTCFullYear(),base.getUTCMonth(),base.getUTCDate())-start)/86400000;const g=2*Math.PI/365*(n-1);const eq=229.18*(0.000075+0.001868*Math.cos(g)-0.032077*Math.sin(g)-0.014615*Math.cos(2*g)-0.040849*Math.sin(2*g));const dec=0.006918-0.399912*Math.cos(g)+0.070257*Math.sin(g)-0.006758*Math.cos(2*g)+0.000907*Math.sin(2*g)-0.002697*Math.cos(3*g)+0.00148*Math.sin(3*g);const la=loc.lat*rad,zen=(90-elev)*rad;let c=(Math.cos(zen)-Math.sin(la)*Math.sin(dec))/(Math.cos(la)*Math.cos(dec));if(c>1||c<-1)return null;const ha=Math.acos(c)*deg;const m=720-4*loc.lng-eq+4*(morning?-ha:ha);const d=new Date(Date.UTC(base.getUTCFullYear(),base.getUTCMonth(),base.getUTCDate()));d.setUTCMinutes(d.getUTCMinutes()+m);return d;}
 const sr=ev(-0.833,true),ss=ev(-0.833,false);if(!sr||!ss)return null;const shaa=(ss-sr)/12,noon=new Date((+sr+ +ss)/2);
 return {alot:ev(-16.1,true)||new Date(+sr-72*6e4),misheyakir:ev(-11.5,true)||new Date(+sr-50*6e4),netz:sr,sofShma:new Date(+sr+3*shaa),sofTfila:new Date(+sr+4*shaa),chatzot:noon,minchaG:new Date(+sr+6.5*shaa),minchaK:new Date(+sr+9.5*shaa),plag:new Date(+sr+10.75*shaa),shkia:ss,tzeit:ev(-8.5,false)||new Date(+ss+50*6e4)};
}
function fmt(d){if(!d)return '—';return d.toLocaleTimeString(L[lang].locale,{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:TZID})}
function gapTxt(ms){const m=Math.round(ms/6e4),h=Math.floor(m/60),mm=m%60;const H=lang==='he'?'שע׳':lang==='en'?'h':'ч',M=lang==='he'?'דק׳':lang==='en'?'min':'мин';return h>0?`${h} ${H} ${mm} ${M}`:`${mm} ${M}`}

/* geometry */
function bearing(a,b){const r=Math.PI/180,dL=(b.lng-a.lng)*r,y=Math.sin(dL)*Math.cos(b.lat*r),x=Math.cos(a.lat*r)*Math.sin(b.lat*r)-Math.sin(a.lat*r)*Math.cos(b.lat*r)*Math.cos(dL);return (Math.atan2(y,x)*180/Math.PI+360)%360}
function distKm(a,b){const r=Math.PI/180,R=6371,dLa=(b.lat-a.lat)*r,dLo=(b.lng-a.lng)*r,h=Math.sin(dLa/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}

/* dates */
function hebParts(){try{const p=new Intl.DateTimeFormat('en-u-ca-hebrew',{day:'numeric'}).formatToParts(new Date());let day=1;p.forEach(x=>{if(x.type==='day')day=parseInt(x.value)});return day}catch(e){return new Date().getDate()}}
function hebDate(){try{const s=new Intl.DateTimeFormat(L[lang].locale+'-u-ca-hebrew',{day:'numeric',month:'long',year:'numeric'}).format(new Date());return s.replace(/\s*(AM|anno mundi|לבריאת העולם|לבריאה)\s*$/i,'').trim()}catch(e){return ''}}
function gregDate(){return new Intl.DateTimeFormat(L[lang].locale,{weekday:'short',day:'numeric',month:'long'}).format(new Date())}

/* prayer hero */
function prayerState(z){
 const now=new Date(),d=L[lang];
 const items=[{n:d.sh,start:z.netz,end:z.chatzot,w:[[d.shma,z.sofShma],[d.amida,z.sofTfila]]},
   {n:d.mi,start:z.minchaG,end:z.shkia,w:[[d.mgedola,z.minchaG],[d.shkia,z.shkia]]},
   {n:d.ma,start:z.tzeit,end:null,w:[[d.tzeit,z.tzeit]]}];
 let c=0; if(z.chatzot&&now<z.chatzot)c=0; else if(z.shkia&&now<z.shkia)c=1; else c=2;
 if(pidx===null)pidx=c;
 const p=items[pidx]; let count;
 if(p.start&&p.end&&now>=p.start&&now<p.end)count=`${d.now} · ${d.until} ${fmt(p.end)}`;
 else if(p.start&&now<p.start)count=`${d.into} ${gapTxt(p.start-now)} · ${fmt(p.start)}`;
 else count=p.start?fmt(p.start):'—';
 return {p,count};
}

 </svg>`;
}

 tzedaka:`${backBtn()}<div class="h1" style="margin:4px 0 8px">${d.t_tzedaka}</div>
   <div class="tz"><div class="tzt">${svg('coin')}${d.tzedakaTitle}</div><p>${d.tzedakaText}</p>

const ROOTS=['today','prayers','brachot','zmanim','more'];
function render(){
 const d=L[lang];
 document.documentElement.lang=lang;
 scr.className='scr'+(lang==='he'?' rtl':'');
 scr.dir=lang==='he'?'rtl':'ltr';
 scr.innerHTML=(screens()[cur]||screens().today);
 const tabs=[['today','sun'],['prayers','book'],['brachot','C'],['zmanim','clock'],['more','dots']];
 const activeRoot=ROOTS.includes(cur)?cur:(hist.length?hist[0]:'today');
 nav.innerHTML=tabs.map(([k,ic])=>{
   if(ic==='C')return `<div class="navc" onclick="go('brachot',true)"><span class="circ">${svg('grape')}</span><span class="n">${d.brachot}</span></div>`;
   return `<button class="${activeRoot===k?'on':''}" onclick="go('${k}',true)">${svg(ic)}<span class="n">${d[k]}</span></button>`}).join('');
 document.getElementById('lc').textContent=d.lc;
}
window.go=function(s,isTab){if(isTab){hist=[];cur=s;}else{if(s!==cur){hist.push(cur);cur=s;}}render();scr.scrollTop=0};
window.back=function(){if(hist.length){cur=hist.pop();}else{cur='today';}render();scr.scrollTop=0};
window.nextP=function(){pidx=((pidx||0)+1)%3;render()};
window.prev=function(){pidx=((pidx||0)+2)%3;render()};
window.cycleLang=function(){const o=['ru','en','he'];setLang(o[(o.indexOf(lang)+1)%3])};
window.setLang=function(l){lang=l;localStorage.setItem('lang',l);render()};
window.autoLang=function(){localStorage.removeItem('lang');lang=detectLang();render()};
window.setNusach=function(n){nusach=n;localStorage.setItem('nusach',n);render()};

/* sensors */
window.requestLocation=function(){
 if(!navigator.geolocation){loc={lat:31.7683,lng:35.2137};render();return;}
 navigator.geolocation.getCurrentPosition(
  p=>{loc={lat:p.coords.latitude,lng:p.coords.longitude};pidx=null;render()},
  ()=>{if(!loc){loc={lat:31.7683,lng:35.2137};render();}},
  {enableHighAccuracy:false,timeout:9000,maximumAge:600000});
};
window.enableCompass=function(){
 const start=()=>{compassOn=true;window.addEventListener('deviceorientation',e=>{
   let h=e.webkitCompassHeading!=null?e.webkitCompassHeading:(e.absolute&&e.alpha!=null?360-e.alpha:null);
   if(h==null)return;heading=h;
   if(cur==='mizrah'&&loc){const b=bearing(loc,KOTEL);const rg=document.getElementById('rose');const ar=document.getElementById('arrow');if(rg)rg.setAttribute('transform',`rotate(${(-heading).toFixed(1)} 130 130)`);if(ar)ar.setAttribute('transform',`rotate(${(b-heading).toFixed(1)} 130 130)`);const alm=document.getElementById('alm');if(alm)alm.innerHTML=alignedNow()?(svg('check')+L[lang].facing):'';}
 },true);render()};
 if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
   DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')start()}).catch(()=>{});
 } else start();
};

/* onboarding: язык авто, выбор нусаха */
function showOnboarding(){
 const d=L[lang];
 ob.innerHTML=`<div class="obhe">שבת אחים גם יחד</div><h1>${d.onbTitle}</h1><p>${d.onbSub}</p>
   <div class="opts">${Object.keys(NUSACH).map(k=>`<button onclick="pickNusach('${k}')">${NUSACH[k][lang]} <span>${NUSACH[k].he}</span></button>`).join('')}</div>
   <small>${d.onbHint}</small>`;
 ob.classList.remove('hidden');
}
window.pickNusach=function(k){nusach=k;localStorage.setItem('nusach',k);ob.classList.add('hidden');render()};

/* init */
window.__zReady=function(){zlibReady=true;if(nusach)render()};
requestLocation();
if(!nusach){showOnboarding();} else {render();}
render();
setInterval(()=>{if(cur==='today'||cur==='zmanim')render()},60000);
if(location.search.indexOf('nosw')<0&&'serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
